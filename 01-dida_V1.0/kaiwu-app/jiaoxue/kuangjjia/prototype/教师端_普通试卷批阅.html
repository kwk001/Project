<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普通试卷批阅 - 教师端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .breadcrumb {
            font-size: 14px;
            color: #666;
        }

        .breadcrumb span {
            color: #1890FF;
            cursor: pointer;
        }

        .breadcrumb span:hover {
            text-decoration: underline;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            color: #1890FF;
        }

        /* 内容区域 - 教务端风格 */
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #F0F2F5;
        }

        /* 返回按钮 */
        .btn-back {
            padding: 10px 20px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .btn-back:hover {
            border-color: #1890FF;
            color: #1890FF;
            box-shadow: 0 4px 12px rgba(24,144,255,0.15);
        }

        /* 批阅进度条 */
        .review-progress-bar {
            background: #fff;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: #666;
        }

        .progress-info strong {
            color: #1890FF;
            font-size: 16px;
        }

        .progress-percentage {
            font-weight: 600;
            color: #1890FF;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #F0F0F0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1890FF 0%, #36CFC9 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* 试卷信息卡片 */
        .exam-info-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exam-info-left {
            flex: 1;
        }

        .exam-info-left h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1f1f1f;
            margin-bottom: 12px;
        }

        .student-info-inline {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .student-info-inline .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .student-info-inline .info-label {
            color: #999;
        }

        .student-info-inline .info-value {
            color: #333;
            font-weight: 500;
        }

        .exam-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .status-tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-tag.orange {
            background: linear-gradient(135deg, #FFF7E6 0%, #FFD591 100%);
            color: #FA8C16;
            border: 1px solid #FFC069;
        }

        .review-progress {
            font-size: 13px;
            color: #666;
        }

        /* 得分显示区域优化 */
        .exam-score-display {
            background: linear-gradient(135deg, #E6F7FF 0%, #F0F5FF 100%);
            border-radius: 12px;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 100px;
            border: 1px solid #91D5FF;
            box-shadow: 0 2px 8px rgba(24, 144, 255, 0.1);
        }

        .score-label {
            font-size: 13px;
            color: #1890FF;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .score-value-wrapper {
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .score-value {
            font-size: 32px;
            font-weight: 700;
            color: #1890FF;
            line-height: 1;
        }

        .score-total {
            font-size: 16px;
            color: #666;
            font-weight: 500;
        }

        /* 批阅区域布局 */
        /* 批阅区域布局 - 教务端风格 */
        .review-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        /* 左侧题目面板 */
        .question-panel {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        /* 右侧侧边栏面板 */
        .sidebar-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        /* 左侧：试卷内容 */
        .paper-content {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .paper-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #F0F0F0;
        }

        .paper-header-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .paper-header-actions {
            display: flex;
            gap: 12px;
        }

        .btn-prev, .btn-next {
            padding: 6px 16px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.3s;
        }

        .btn-prev:hover, .btn-next:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .btn-prev:disabled, .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 题目卡片 */
        .question-card {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #F0F0F0;
        }

        .question-card:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
        }

        .question-number {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .question-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .question-type-tag {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .question-type-tag::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .question-type-tag.设计 {
            background: #E6F7FF;
            color: #1890FF;
        }

        .question-type-tag.设计::before {
            background: #1890FF;
        }

        .question-type-tag.工艺 {
            background: #F6FFED;
            color: #52C41A;
        }

        .question-type-tag.工艺::before {
            background: #52C41A;
        }

        .question-type-tag.编程 {
            background: #FFF7E6;
            color: #FA8C16;
        }

        .question-type-tag.编程::before {
            background: #FA8C16;
        }

        .question-type-tag.加工 {
            background: #FFF2F0;
            color: #F5222D;
        }

        .question-type-tag.加工::before {
            background: #F5222D;
        }

        .question-type-tag.检测 {
            background: #F9F0FF;
            color: #722ED1;
        }

        .question-type-tag.检测::before {
            background: #722ED1;
        }

        .question-type-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
            background: #F5F5F5;
            color: #666;
            border: 1px solid #E8E8E8;
        }

        .question-content {
            font-size: 14px;
            color: #333;
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .question-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: #FAFAFA;
            border-radius: 6px;
            font-size: 14px;
            color: #666;
        }

        .option-item.correct {
            background: #F6FFED;
            border: 1px solid #B7EB8F;
            color: #52C41A;
        }

        .option-item.wrong {
            background: #FFF2F0;
            border: 1px solid #FFCCC7;
            color: #FF4D4F;
        }

        .option-label {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #E8E8E8;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 500;
        }

        .option-item.correct .option-label {
            background: #52C41A;
            color: #fff;
        }

        .option-item.wrong .option-label {
            background: #FF4D4F;
            color: #fff;
        }

        /* 答案区域整体卡片 */
        .answer-section {
            background: #fff;
            border: 1px solid #E8E8E8;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .answer-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .answer-section-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: #1890FF;
            border-radius: 2px;
        }

        /* 答案对比区域 */
        .answer-compare-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .answer-box {
            background: #FAFAFA;
            border-radius: 6px;
            padding: 16px;
            border: 1px solid #E8E8E8;
        }

        .answer-box.correct-box {
            background: #F6FFED;
            border-color: #B7EB8F;
        }

        .answer-box.student-box {
            background: #E6F7FF;
            border-color: #91D5FF;
        }

        .answer-box.wrong-answer {
            background: #FFF2F0;
            border-color: #FFA39E;
        }

        .answer-box-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .answer-box-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .correct-box .answer-box-icon {
            background: #52C41A;
            color: #fff;
        }

        .student-box .answer-box-icon {
            background: #1890FF;
            color: #fff;
        }

        .wrong-answer .answer-box-icon {
            background: #FF4D4F;
            color: #fff;
        }

        .answer-box-label {
            font-size: 13px;
            font-weight: 500;
            color: #666;
        }

        .correct-box .answer-box-label {
            color: #52C41A;
        }

        .student-box .answer-box-label {
            color: #1890FF;
        }

        .wrong-answer .answer-box-label {
            color: #FF4D4F;
        }

        .answer-box-value {
            font-size: 14px;
            color: #333;
            padding: 12px;
            background: #fff;
            border-radius: 4px;
            display: block;
            line-height: 1.6;
            border: 1px solid #E8E8E8;
        }

        .answer-box-value.correct {
            color: #52C41A;
            border-color: #B7EB8F;
        }

        .answer-box-value.wrong {
            color: #FF4D4F;
            border-color: #FFA39E;
        }

        /* 评分区域 */
        .score-input-section {
            background: #FAFAFA;
            border-radius: 6px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid #E8E8E8;
        }

        .score-input-section label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .score-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-input {
            width: 60px;
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            color: #333;
        }

        .score-input:focus {
            outline: none;
            border-color: #1890FF;
        }

        .score-max {
            font-size: 14px;
            color: #666;
        }

        .btn-save-score {
            padding: 8px 16px;
            background: #52C41A;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-save-score:hover {
            background: #389E0D;
        }

        /* 学生答案区域 */
        .student-answer-section {
            background: #F5F7FA;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .student-answer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .student-answer-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .answer-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .answer-status.correct {
            background: #F6FFED;
            color: #52C41A;
        }

        .answer-status.wrong {
            background: #FFF2F0;
            color: #FF4D4F;
        }

        .student-answer-content {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        /* 参考答案 */
        .reference-answer {
            background: #E6F7FF;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .reference-answer-title {
            font-size: 14px;
            font-weight: 600;
            color: #1890FF;
            margin-bottom: 8px;
        }

        .reference-answer-content {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        /* 评语区域 */
        .comment-section {
            margin-bottom: 20px;
        }

        .comment-section label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .comment-section textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
        }

        .comment-section textarea:focus {
            outline: none;
            border-color: #1890FF;
            box-shadow: 0 0 0 3px rgba(24,144,255,0.1);
        }

        .btn-save-comment {
            margin-top: 8px;
            padding: 8px 16px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s;
        }

        .btn-save-comment:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        /* 右侧：学生信息和题目导航 */
        .sidebar-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
        }

        /* 学生信息面板 */
        .student-info-panel {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .student-info-panel h3 {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .info-label {
            color: #666;
        }

        .info-value {
            color: #333;
            font-weight: 500;
        }

        /* 题目导航面板 */
        .question-nav-panel {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .question-nav-panel h3 {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
        }

        /* 学生信息 */
        .student-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .student-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1890FF 0%, #36CFC9 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
        }

        .student-details {
            flex: 1;
        }

        .student-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .student-id {
            font-size: 13px;
            color: #999;
        }

        .student-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-item {
            text-align: center;
            padding: 12px;
            background: #F5F7FA;
            border-radius: 8px;
        }

        .stat-item-value {
            font-size: 20px;
            font-weight: 700;
            color: #1890FF;
            margin-bottom: 4px;
        }

        .stat-item-label {
            font-size: 12px;
            color: #666;
        }

        /* 题目导航 */
        .question-nav {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .question-nav .nav-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #E8E8E8;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            background: #fff;
            padding: 0;
            width: 100%;
        }

        .question-nav .nav-item:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .question-nav .nav-item.active {
            background: #1890FF;
            border-color: #1890FF;
            color: #fff;
        }

        .question-nav .nav-item.answered {
            background: #F6FFED;
            border-color: #52C41A;
            color: #52C41A;
        }

        .question-nav .nav-item.current {
            box-shadow: 0 0 0 2px #1890FF;
        }

        /* 批阅操作按钮 */
        .review-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-save, .btn-submit {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save {
            background: #fff;
            border: 1px solid #D9D9D9;
            color: #666;
        }

        .btn-save:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .btn-submit {
            background: linear-gradient(135deg, #1890FF 0%, #36CFC9 100%);
            color: #fff;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(24,144,255,0.3);
        }

        /* 导航按钮 */
        .navigation-buttons {
            display: flex;
            gap: 12px;

                            </div>
                        </div>

                        <div class="score-input-section">
                            <label>评分：</label>
                            <div class="score-input-wrapper">
                                <input type="number" id="score${question.id}" value="${scoreValue}" min="0" max="${question.maxScore}" placeholder="输入得分" class="score-input">
                                <span class="score-max">/ ${question.maxScore} 分</span>
                            </div>
                            <button class="btn-save-score" onclick="saveScore(${question.id})">保存得分</button>
                        </div>
                    </div>
                    
                    <!-- 评语区域 -->
                    <div class="comment-section">
                        <label>批阅评语：</label>
                        <textarea id="comment${question.id}" placeholder="请输入批阅评语..." rows="3">${question.comment || ''}</textarea>
                        <button class="btn-save-comment" onclick="saveComment(${question.id})">保存评语</button>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }

        // 初始化题目导航
        function initQuestionNav() {
            const navGrid = document.getElementById('questionNavGrid');
            if (!navGrid) return;

            let html = '';
            questionsData.forEach((q, index) => {
                const questionNum = index + 1;
                let statusClass = '';
                let statusText = '';

                if (q.status === 'answered') {
                    if (q.isCorrect) {
                        statusClass = 'correct';
                        statusText = '✓';
                    } else {
                        statusClass = 'wrong';
                        statusText = '✗';
                    }
                } else if (q.status === 'reviewing') {
                    statusClass = 'current';
                    statusText = '批';
                } else {
                    statusClass = 'pending';
                    statusText = questionNum;
                }

                html += `
                    <div class="nav-item ${statusClass} ${questionNum === currentQuestion ? 'active' : ''}" 
                         onclick="switchQuestion(${questionNum})" 
                         title="第${questionNum}题">
                        ${statusText}
                    </div>
                `;
            });

            navGrid.innerHTML = html;
        }

        // 切换题目
        function switchQuestion(questionNum) {
            if (questionNum < 1 || questionNum > totalQuestions) return;
            currentQuestion = questionNum;
            updateQuestionDisplay(questionNum);
            initQuestionNav(); // 重新渲染导航
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestion > 1) {
                switchQuestion(currentQuestion - 1);
            } else {
                alert('已经是第一题了');
            }
        }

        // 下一题
        function nextQuestion() {
            if (currentQuestion < totalQuestions) {
                switchQuestion(currentQuestion + 1);
            } else {
                alert('已经是最后一题了');
            }
        }

        // 保存批阅进度
        function saveReview() {
            // 显示保存成功提示
            showToast('批阅进度已保存');
        }

        // 保存得分
        function saveScore(questionId) {
            const scoreInput = document.getElementById(`score${questionId}`);
            const score = parseFloat(scoreInput.value);
            const question = questionsData.find(q => q.id === questionId);
            
            if (isNaN(score) || score < 0 || score > question.maxScore) {
                alert(`请输入有效的得分（0-${question.maxScore}分）`);
                return;
            }
            
            question.score = score;
            updateProgress();
            showToast('得分已保存');
        }

        // 保存评语
        function saveComment(questionId) {
            const commentInput = document.getElementById(`comment${questionId}`);
            const comment = commentInput.value.trim();
            const question = questionsData.find(q => q.id === questionId);
            
            question.comment = comment;
            showToast('评语已保存');
        }

        // 提交批阅结果
        function submitReview() {
            if (confirm('确定要提交批阅结果吗？提交后将无法修改。')) {
                showToast('批阅结果已提交');
                setTimeout(() => {
                    goBack();
                }, 1500);
            }
        }

        // 显示提示信息
        function showToast(message) {
            // 创建toast元素
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.8);
                color: #fff;
                padding: 16px 32px;
                border-radius: 8px;
                font-size: 14px;
                z-index: 9999;
                animation: fadeIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            // 2秒后移除
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 2000);
        }

        // 播放视频
        function playVideo() {
            showToast('正在播放学生操作录像...');
        }

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
                to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            }
            @keyframes fadeOut {
                from { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                to { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            }
        `;
        document.head.appendChild(style);

        // 页面加载时初始化
        window.onload = initPage;
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
</html>
