<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预警配置 - 教师端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; display: flex; height: 100vh; overflow: hidden; }
.menu-title.collapsed
.menu-item span { display: flex; align-items: center; }

        .content { flex: 1; overflow: auto; padding: 20px; }
        .filter-bar { background: #fff; padding: 16px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .filter-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
        .filter-item { display: flex; align-items: center; gap: 8px; }
        .filter-item label { font-size: 13px; color: #666; white-space: nowrap; }
        .filter-item input, .filter-item select { padding: 8px 12px; border: 1px solid #D9D9D9; border-radius: 4px; font-size: 13px; min-width: 140px; }
        .filter-btns { display: flex; gap: 8px; margin-left: auto; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: #1890FF; color: #fff; }
        .btn-primary:hover { background: #40A9FF; }
        .btn-success { background: #52C41A; color: #fff; }
        .btn-success:hover { background: #73D13D; }
        .btn-warning { background: #FA8C16; color: #fff; }
        .btn-warning:hover { background: #FFA940; }
        .btn-danger { background: #FF4D4F; color: #fff; }
        .btn-danger:hover { background: #FF7875; }
        .btn-default { background: #fff; color: #666; border: 1px solid #D9D9D9; }
        .btn-default:hover { border-color: #1890FF; color: #1890FF; }
        .toolbar { background: #fff; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
        .toolbar-left { display: flex; gap: 8px; }
        .toolbar-right { display: flex; gap: 8px; align-items: center; }
        .table-container { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { background: #FAFAFA; padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: #333; border-bottom: 1px solid #E8E8E8; white-space: nowrap; }
        .data-table td { padding: 12px 16px; font-size: 13px; color: #666; border-bottom: 1px solid #F0F0F0; }
        .data-table tbody tr:hover { background: #F6FFFE; }
        .data-table tbody tr.selected { background: #E6F7FF; }
        .checkbox { width: 16px; height: 16px; cursor: pointer; }
        .status-tag { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .status-enabled { background: #F6FFED; color: #52C41A; border: 1px solid #B7EB8F; }
        .status-disabled { background: #FFF2F0; color: #FF4D4F; border: 1px solid #FFA39E; }
        .pagination { display: flex; justify-content: flex-end; align-items: center; padding: 16px 20px; gap: 8px; }
        .pagination-btn { padding: 6px 12px; border: 1px solid #D9D9D9; background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .pagination-btn:hover { border-color: #1890FF; color: #1890FF; }
        .pagination-btn.active { background: #1890FF; color: #fff; border-color: #1890FF; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; border-radius: 8px; width: 90%; max-width: 700px; max-height: 90vh; overflow: auto; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid #E8E8E8; display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 16px; font-weight: 600; color: #333; }
        .modal-close { font-size: 20px; color: #999; cursor: pointer; background: none; border: none; }
        .modal-close:hover { color: #666; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 16px 20px; border-top: 1px solid #E8E8E8; display: flex; justify-content: flex-end; gap: 12px; }
        .form-row { display: flex; gap: 16px; margin-bottom: 16px; }
        .form-item { flex: 1; }
        .form-item label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; }
        .form-item input, .form-item select, .form-item textarea { width: 100%; padding: 8px 12px; border: 1px solid #D9D9D9; border-radius: 4px; font-size: 13px; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #fff; padding: 16px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-value { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 4px; }
        .stat-label { font-size: 13px; color: #666; }
        .stat-card.primary .stat-value { color: #1890FF; }
        .stat-card.success .stat-value { color: #52C41A; }
        .stat-card.warning .stat-value { color: #FA8C16; }
        .stat-card.danger .stat-value { color: #FF4D4F; }
        
        /* 预警规则配置样式 */
        .alert-config { background: #FAFAFA; border: 1px solid #E8E8E8; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .alert-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .alert-title { font-size: 14px; font-weight: 600; color: #333; }
        .alert-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #fff; border-radius: 4px; border: 1px solid #E8E8E8; margin-bottom: 8px; }
        .alert-type { width: 100px; font-weight: 500; }
        .alert-days { width: 80px; }
        .alert-time { width: 120px; }
        .alert-recipients { flex: 1; }
        .toggle-switch { position: relative; width: 44px; height: 22px; background: #D9D9D9; border-radius: 11px; cursor: pointer; transition: all 0.3s; }
        .toggle-switch.active { background: #52C41A; }
        .toggle-switch::after { content: ''; position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: all 0.3s; }
        .toggle-switch.active::after { left: 24px; }
        .recipient-tag { display: inline-block; padding: 4px 8px; background: #E6F7FF; color: #1890FF; border-radius: 4px; font-size: 12px; margin-right: 4px; margin-bottom: 4px; }
        .recipient-tag .remove { margin-left: 4px; cursor: pointer; }
    
        /* 菜单图标宽度修复 */
        .menu-item .iconfont {
            width: 20px;
            min-width: 20px;
            text-align: center;
            margin-right: 8px;
            font-size: 16px;
            display: inline-block;
            flex-shrink: 0;
        }
        
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>
    

    <div class="main-content">
        <div class="header">
            <div>首页 / 生产管理 / 预警配置</div>
            <div>👤 教师：张老师 | <button class="btn btn-danger" onclick="logout()">退出</button></div>
        </div>
        
        <div class="content">
            <div class="stats-row">
                <div class="stat-card primary">
                    <div class="stat-value">6</div>
                    <div class="stat-label">预警规则总数</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-value">5</div>
                    <div class="stat-label">已启用</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-value">1</div>
                    <div class="stat-label">已禁用</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-value">12</div>
                    <div class="stat-label">本月预警次数</div>
                </div>
            </div>
            
            <div class="filter-bar">
                <div class="filter-row">
                    <div class="filter-item">
                        <label>规则名称</label>
                        <input type="text" placeholder="请输入规则名称">
                    </div>
                    <div class="filter-item">
                        <label>预警类型</label>
                        <select>
                            <option value="">全部</option>
                            <option value="delay">延期预警</option>
                            <option value="warning">进度预警</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>规则状态</label>
                        <select>
                            <option value="">全部</option>
                            <option value="enabled">已启用</option>
                            <option value="disabled">已禁用</option>
                        </select>
                    </div>
                    <div class="filter-btns">
                        <button class="btn btn-primary">🔍 查询</button>
                        <button class="btn btn-default">重置</button>
                    </div>
                </div>
            </div>
            
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="btn btn-success" onclick="showCreateModal()">➕ 新增预警规则</button>
                </div>
                <div class="toolbar-right">
                    <button class="btn btn-default">✅ 批量启用</button>
                    <button class="btn btn-default">🚫 批量禁用</button>
                    <button class="btn btn-danger">🗑️ 批量删除</button>
                </div>
            </div>
            
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width: 40px;"><input type="checkbox" class="checkbox"></th>
                            <th>规则名称</th>
                            <th>预警类型</th>
                            <th>提前天数</th>
                            <th>发送时间</th>
                            <th>收件人</th>
                            <th>规则状态</th>
                            <th>本月发送</th>
                            <th style="width: 180px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="checkbox" class="checkbox"></td>
                            <td>项目延期预警</td>
                            <td><span style="color: #FF4D4F; font-weight: 600;">延期预警</span></td>
                            <td>1天</td>
                            <td>09:00</td>
                            <td>张老师, 李老师, 王经理</td>
                            <td><span class="status-tag status-enabled">已启用</span></td>
                            <td>5次</td>
                            <td>
                                <button class="btn btn-primary" style="padding: 4px 12px; font-size: 12px;">详情</button>
                                <button class="btn btn-warning" style="padding: 4px 12px; font-size: 12px;">编辑</button>
                                <button class="btn btn-danger" style="padding: 4px 12px; font-size: 12px;">删除</button>
                            </td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" class="checkbox"></td>
                            <td>进度滞后预警</td>
                            <td><span style="color: #FA8C16; font-weight: 600;">进度预警</span></td>
                            <td>2天</td>
                            <td>14:00</td>
                            <td>张老师, 李老师</td>
                            <td><span class="status-tag status-enabled">已启用</span></td>
                            <td>3次</td>
                            <td>
                                <button class="btn btn-primary" style="padding: 4px 12px; font-size: 12px;">详情</button>
                                <button class="btn btn-warning" style="padding: 4px 12px; font-size: 12px;">编辑</button>
                                <button class="btn btn-danger" style="padding: 4px 12px; font-size: 12px;">删除</button>
                            </td>
                        </tr>
                        <tr>
                            <td><input type="checkbox" class="checkbox"></td>
                            <td>阶段完成提醒</td>
                            <td><span style="color: #52C41A; font-weight: 600;">进度预警</span></td>
                            <td>1天</td>
                            <td>17:00</td>
                            <td>全体教师</td>
                            <td><span class="status-tag status-enabled">已启用</span></td>
                            <td>4次</td>
                            <td>
                                <button class="btn btn-primary" style="padding: 4px 12px; font-size: 12px;">详情</button>
                                <button class="btn btn-warning" style="padding: 4px 12px; font-size: 12px;">编辑</button>
                                <button class="btn btn-danger" style="padding: 4px 12px; font-size: 12px;">删除</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="pagination">
                    <span style="font-size: 13px; color: #666;">共 6 条记录</span>
                    <button class="pagination-btn">上一页</button>
                    <button class="pagination-btn active">1</button>
                    <button class="pagination-btn">下一页</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">➕ 新增预警规则</span>
                <button class="modal-close" onclick="closeModal('createModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-item">
                        <label>规则名称 <span style="color: #FF4D4F;">*</span></label>
                        <input type="text" placeholder="请输入规则名称">
                    </div>
                    <div class="form-item">
                        <label>预警类型 <span style="color: #FF4D4F;">*</span></label>
                        <select>
                            <option value="">请选择预警类型</option>
                            <option value="delay">延期预警</option>
                            <option value="warning">进度预警</option>
                        </select>
                    </div>
                </div>
                
                <div class="alert-config">
                    <div class="alert-header">
                        <div class="alert-title">预警条件配置</div>
                    </div>
                    <div class="alert-item">
                        <div class="alert-type">提前天数</div>
                        <div class="alert-days">
                            <input type="number" value="1" min="1" max="30" style="width: 100%;"> 天
                        </div>
                        <div style="font-size: 12px; color: #999;">在截止日期前N天发送预警</div>
                    </div>
                    <div class="alert-item">
                        <div class="alert-type">发送时间</div>
                        <div class="alert-time">
                            <input type="time" value="09:00" style="width: 100%;">
                        </div>
                        <div style="font-size: 12px; color: #999;">每天固定时间发送邮件</div>
                    </div>
                </div>
                
                <div class="alert-config">
                    <div class="alert-header">
                        <div class="alert-title">收件人配置</div>
                    </div>
                    <div class="form-row">
                        <div class="form-item">
                            <label>添加收件人</label>
                            <select id="recipientSelect" onchange="addRecipient()">
                                <option value="">请选择收件人</option>
                                <option value="张老师">张老师</option>
                                <option value="李老师">李老师</option>
                                <option value="王老师">王老师</option>
                                <option value="赵经理">赵经理</option>
                                <option value="全体教师">全体教师</option>
                            </select>
                        </div>
                    </div>
                    <div id="recipientList" style="margin-top: 8px;">
                        <span class="recipient-tag">张老师 <span class="remove" onclick="removeRecipient(this)">×</span></span>
                        <span class="recipient-tag">李老师 <span class="remove" onclick="removeRecipient(this)">×</span></span>
                    </div>
                </div>
                
                <div class="alert-config">
                    <div class="alert-header">
                        <div class="alert-title">邮件内容模板</div>
                    </div>
                    <div class="form-row">
                        <div class="form-item">
                            <label>邮件主题</label>
                            <input type="text" value="【项目预警】{项目名称} - {预警类型}" placeholder="请输入邮件主题">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-item">
                            <label>邮件正文</label>
                            <textarea rows="4" placeholder="请输入邮件正文模板">尊敬的老师：

项目【{项目名称}】出现{预警类型}，请及时处理。

项目编号：{项目编号}
当前阶段：{当前阶段}
计划完成时间：{计划时间}
实际进度：{实际进度}

请及时关注项目进展，谢谢！</textarea>
                        </div>
                    </div>
                </div>
                
                <div class="form-row" style="margin-top: 16px;">
                    <div class="form-item">
                        <label>规则状态</label>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
                            <span style="font-size: 13px; color: #666;">启用</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal('createModal')">取消</button>
                <button class="btn btn-primary">保存规则</button>
            </div>
        </div>
    </div>

    <script>
        function showCreateModal() {
            document.getElementById('createModal').classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        function addRecipient() {
            const select = document.getElementById('recipientSelect');
            const recipient = select.value;
            if (!recipient) return;
            
            const list = document.getElementById('recipientList');
            const tag = document.createElement('span');
            tag.className = 'recipient-tag';
            tag.innerHTML = `${recipient} <span class="remove" onclick="removeRecipient(this)">×</span>`;
            list.appendChild(tag);
            
            select.value = '';
        }
        
        function removeRecipient(btn) {
            btn.parentElement.remove();
        }
        
        function toggleMenu(element) {
            element.classList.toggle('collapsed');
            const menuItems = element.nextElementSibling;
            if (menuItems) {
                menuItems.classList.toggle('collapsed');
            }
        }
        
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                alert('已退出登录');
            }
        }
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
</html>
