<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩分析 - 教师端</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
        }
        .sidebar {
            width: 220px;
            background: #001529;
            display: flex;
            flex-direction: column;
        }
        .logo {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .menu-item {
            padding: 12px 24px;
            cursor: pointer;
            color: rgba(255,255,255,0.65);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 14px;
        }
        .menu-item:hover, .menu-item.active {
            background: #52C41A;
            color: #fff;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            height: 64px;
            background: #fff;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .content-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }
        .filter-section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .filter-row {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-item label {
            font-size: 14px;
            color: #666;
        }
        .filter-item select {
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 14px;
            min-width: 150px;
        }
        .btn-search {
            padding: 8px 20px;
            background: #52C41A;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
        .full-width-chart {
            grid-column: 1 / -1;
        }
        .score-distribution {
            display: flex;
            gap: 16px;
            margin-top: 20px;
        }
        .score-range {
            flex: 1;
            text-align: center;
            padding: 16px;
            border-radius: 8px;
        }
        .score-range.excellent { background: #F6FFED; color: #52C41A; }
        .score-range.good { background: #E6F7FF; color: #1890FF; }
        .score-range.medium { background: #FFF7E6; color: #FA8C16; }
        .score-range.poor { background: #FFF1F0; color: #FF4D4F; }
        .range-number {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .range-label {
            font-size: 13px;
        }
        .range-percent {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>

    <div class="main-content">
        <div class="header">
            <div>首页 / 报表中心 / 成绩分析</div>
            <div>👨‍🏫 教师：张三 | <button style="padding: 6px 16px; background: #FF4D4F; color: #fff; border: none; border-radius: 4px; cursor: pointer;">退出</button></div>
        </div>

        <div class="content-body">
            <!-- 筛选 -->
            <div class="filter-section">
                <div class="filter-row">
                    <div class="filter-item">
                        <label>课程</label>
                        <select>
                            <option>机械制图</option>
                            <option>数控加工技术</option>
                            <option>CAD/CAM技术</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>考试</label>
                        <select>
                            <option>期末考试</option>
                            <option>期中考试</option>
                            <option>章节测试</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>班级</label>
                        <select>
                            <option>全部班级</option>
                            <option>机械工程1班</option>
                            <option>机械工程2班</option>
                        </select>
                    </div>
                    <button class="btn-search">🔍 分析</button>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value">32</div>
                    <div class="stat-label">参考人数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">78.5</div>
                    <div class="stat-label">平均分</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">95</div>
                    <div class="stat-label">最高分</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">52</div>
                    <div class="stat-label">最低分</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">87.5%</div>
                    <div class="stat-label">及格率</div>
                </div>
            </div>

            <!-- 图表区域 -->
            <div class="chart-grid">
                <!-- 成绩分布柱状图 -->
                <div class="chart-card">
                    <div class="chart-title">成绩分布</div>
                    <div class="chart-container">
                        <canvas id="scoreChart"></canvas>
                    </div>
                </div>

                <!-- 分数段饼图 -->
                <div class="chart-card">
                    <div class="chart-title">分数段占比</div>
                    <div class="chart-container">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>

                <!-- 班级对比图 -->
                <div class="chart-card full-width-chart">
                    <div class="chart-title">班级成绩对比</div>
                    <div class="chart-container">
                        <canvas id="classChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 分数段统计 -->
            <div class="chart-card">
                <div class="chart-title">分数段统计</div>
                <div class="score-distribution">
                    <div class="score-range excellent">
                        <div class="range-number">8</div>
                        <div class="range-label">优秀 (90-100)</div>
                        <div class="range-percent">25%</div>
                    </div>
                    <div class="score-range good">
                        <div class="range-number">12</div>
                        <div class="range-label">良好 (80-89)</div>
                        <div class="range-percent">37.5%</div>
                    </div>
                    <div class="score-range medium">
                        <div class="range-number">8</div>
                        <div class="range-label">中等 (60-79)</div>
                        <div class="range-percent">25%</div>
                    </div>
                    <div class="score-range poor">
                        <div class="range-number">4</div>
                        <div class="range-label">不及格 (<60)</div>
                        <div class="range-percent">12.5%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 成绩分布柱状图
        const scoreCtx = document.getElementById('scoreChart').getContext('2d');
        new Chart(scoreCtx, {
            type: 'bar',
            data: {
                labels: ['<60', '60-69', '70-79', '80-89', '90-100'],
                datasets: [{
                    label: '人数',
                    data: [4, 3, 5, 12, 8],
                    backgroundColor: ['#FF4D4F', '#FA8C16', '#FAAD14', '#1890FF', '#52C41A'],
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { stepSize: 2 }
                    }
                }
            }
        });

        // 分数段饼图
        const pieCtx = document.getElementById('pieChart').getContext('2d');
        new Chart(pieCtx, {
            type: 'doughnut',
            data: {
                labels: ['优秀', '良好', '中等', '不及格'],
                datasets: [{
                    data: [25, 37.5, 25, 12.5],
                    backgroundColor: ['#52C41A', '#1890FF', '#FA8C16', '#FF4D4F']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });

        // 班级对比图
        const classCtx = document.getElementById('classChart').getContext('2d');
        new Chart(classCtx, {
            type: 'bar',
            data: {
                labels: ['机械工程1班', '机械工程2班', '数控技术1班'],
                datasets: [
                    {
                        label: '平均分',
                        data: [82, 76, 79],
                        backgroundColor: '#1890FF'
                    },
                    {
                        label: '最高分',
                        data: [95, 92, 94],
                        backgroundColor: '#52C41A'
                    },
                    {
                        label: '最低分',
                        data: [58, 52, 55],
                        backgroundColor: '#FF4D4F'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
</html>
