<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加实训试卷 - 教师端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* 返回按钮 */
        .btn-back {
            padding: 8px 16px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        /* 步骤条 */
        .steps {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #F0F0F0;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .step.active .step-number {
            background: linear-gradient(135deg, #1890FF 0%, #36CFC9 100%);
            color: #fff;
        }

        .step-title {
            font-size: 14px;
            color: #999;
        }

        .step.active .step-title {
            color: #1890FF;
            font-weight: 500;
        }

        .step-line {
            width: 80px;
            height: 2px;
            background: #F0F0F0;
            margin: 0 16px;
        }

        /* 表单容器 */
        .form-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #F0F0F0;
        }

        /* 试卷选择器 */
        .paper-selector {
            position: relative;
        }

        .paper-selector-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .paper-selector-input:hover {
            border-color: #1890FF;
        }

        .paper-selector-input.has-value {
            border-color: #1890FF;
            background: #F0F5FF;
        }

        .paper-selector-input .placeholder {
            color: #999;
        }

        .paper-selector-input .value {
            color: #333;
            font-weight: 500;
        }

        /* 试卷选择弹窗 */
        .paper-dialog-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .paper-dialog-overlay.active {
            display: flex;
        }

        .paper-dialog {
            background: #fff;
            border-radius: 12px;
            width: 700px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .paper-dialog-header {
            padding: 20px 24px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .paper-dialog-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .paper-dialog-close {
            font-size: 24px;
            color: #999;
            cursor: pointer;
            background: none;
            border: none;
        }

        .paper-dialog-search {
            padding: 16px 24px;
            border-bottom: 1px solid #F0F0F0;
        }

        .paper-dialog-search input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            font-size: 14px;
        }

        .paper-dialog-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            max-height: 400px;
        }

        .paper-dialog-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border: 2px solid #F0F0F0;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .paper-dialog-item:hover {
            border-color: #1890FF;
            background: #F0F5FF;
        }

        .paper-dialog-item.selected {
            border-color: #1890FF;
            background: #E6F7FF;
        }

        .paper-dialog-item input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .paper-dialog-info {
            flex: 1;
        }

        .paper-dialog-name {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }

        .paper-dialog-meta {
            font-size: 13px;
            color: #666;
            display: flex;
            gap: 16px;
        }

        .paper-dialog-footer {
            padding: 16px 24px;
            border-top: 1px solid #F0F0F0;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* 学生选择 */
        .student-selection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding: 4px;
        }

        .student-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border: 2px solid #F0F0F0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .student-option:hover {
            border-color: #1890FF;
            background: #F0F5FF;
        }

        .student-option.selected {
            border-color: #1890FF;
            background: #E6F7FF;
        }

        .student-option input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .student-info {
            flex: 1;
        }

        .student-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 2px;
        }

        .student-class {
            font-size: 12px;
            color: #999;
        }

        /* 多选班级样式 */
        .class-selector-multi {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            background: #fff;
            margin-bottom: 16px;
        }

        .class-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: #F5F5F5;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .class-checkbox:hover {
            background: #E6F7FF;
            border-color: #1890FF;
        }

        .class-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #1890FF;
        }

        .class-checkbox .checkbox-text {
            font-size: 14px;
            color: #333;
            user-select: none;
        }

        .class-checkbox:has(input:checked) {
            background: #E6F7FF;
            border-color: #1890FF;
        }

        .class-checkbox:has(input:checked) .checkbox-text {
            color: #1890FF;
            font-weight: 500;
        }

        /* 全选工具栏 */
        .selection-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: #FAFAFA;
            border-radius: 6px;
        }

        .selection-count {
            font-size: 14px;
            color: #666;
        }

        .selection-count strong {
            color: #1890FF;
        }

        .btn-select-all {
            padding: 6px 16px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.3s;
        }

        .btn-select-all:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        /* 搜索框 */
        .search-box {
            margin-bottom: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #1890FF;
            box-shadow: 0 0 0 3px rgba(24,144,255,0.1);
        }

        /* 按钮组 */
        .form-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #F0F0F0;
        }

        .btn {
            padding: 12px 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-default {
            background: #fff;
            border: 1px solid #D9D9D9;
            color: #666;
        }

        .btn-default:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1890FF 0%, #36CFC9 100%);
            border: none;
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(24,144,255,0.3);
        }

        /* 提示信息 */
        .tips {
            background: #FFF7E6;
            border: 1px solid #FFD591;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #FA8C16;
        }

        .tips::before {
            content: '💡 ';
        }
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>
    

    <div class="main-content">
        <div class="header">
            <div class="breadcrumb">首页 / 我的教学 / 我的课程 / <span id="courseName">机械制图</span> / 添加实训试卷</div>
            <div>👨‍🏫 教师：张三 | <button onclick="logout()" class="logout-btn">退出登录</button></div>
        </div>

        <div class="content-body">
            <!-- 返回按钮 -->
            <button class="btn-back" onclick="goBack()">
                <i class="iconfont icon-fanhui"></i> 返回课程详情
            </button>

            <!-- 步骤条 -->
            <div class="steps">
                <div class="step active" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-title">选择实训试卷</div>
                </div>
                <div class="step-line"></div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-title">选择发布对象</div>
                </div>
                <div class="step-line"></div>
                <div class="step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-title">完成</div>
                </div>
            </div>

            <!-- 表单容器 -->
            <div class="form-container">
                <!-- 提示信息 -->
                <div class="tips">
                    请从实训试卷库中选择试卷，并选择发布对象（学生），带 <span style="color: #FF4D4F;">*</span> 的为必填项
                </div>

                <!-- 选择实训试卷 -->
                <div class="form-section">
                    <div class="section-title">📋 选择实训试卷 <span style="color: #FF4D4F;">*</span></div>
                    <div class="paper-selector">
                        <div class="paper-selector-input" onclick="openPaperDialog()" id="paperSelectorInput">
                            <span class="placeholder">点击选择实训试卷...</span>
                            <span style="color: #999;">▼</span>
                        </div>
                    </div>
                </div>

                <!-- 试卷选择弹窗 -->
                <div class="paper-dialog-overlay" id="paperDialogOverlay">
                    <div class="paper-dialog">
                        <div class="paper-dialog-header">
                            <div class="paper-dialog-title">选择实训试卷</div>
                            <button class="paper-dialog-close" onclick="closePaperDialog()">&times;</button>
                        </div>
                        <div class="paper-dialog-search">
                            <input type="text" id="paperDialogSearch" placeholder="搜索试卷名称..." oninput="filterPapers()">
                        </div>
                        <div class="paper-dialog-list" id="paperDialogList">
                            <!-- 动态渲染试卷列表 -->
                        </div>
                        <div class="paper-dialog-footer">
                            <button class="btn btn-default" onclick="closePaperDialog()">取消</button>
                            <button class="btn btn-primary" onclick="confirmPaperSelection()">确定</button>
                        </div>
                    </div>
                </div>

                <!-- 选择发布对象 -->
                <div class="form-section">
                    <div class="section-title">🎯 选择发布对象（学生） <span style="color: #FF4D4F;">*</span></div>

                    <!-- 班级选择 -->
                    <div class="form-row" style="margin-bottom: 16px;">
                        <div class="form-item">
                            <label>选择班级 <span style="color: #FF4D4F;">*</span></label>
                            <div class="class-selector-multi" id="classSelectorContainer">
                                <label class="class-checkbox">
                                    <input type="checkbox" value="机械2301班" onchange="filterStudentsByClass()">
                                    <span class="checkbox-text">机械2301班</span>
                                </label>
                                <label class="class-checkbox">
                                    <input type="checkbox" value="机械2302班" onchange="filterStudentsByClass()">
                                    <span class="checkbox-text">机械2302班</span>
                                </label>
                                <label class="class-checkbox">
                                    <input type="checkbox" value="数控2301班" onchange="filterStudentsByClass()">
                                    <span class="checkbox-text">数控2301班</span>
                                </label>
                                <label class="class-checkbox">
                                    <input type="checkbox" value="模具2301班" onchange="filterStudentsByClass()">
                                    <span class="checkbox-text">模具2301班</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- 班级选择提示 -->
                    <div class="tips" style="margin-bottom: 16px;">
                        可选择多个班级，然后在所选班级下选择学生作为发布对象
                    </div>

                    <!-- 搜索框 -->
                    <div class="search-box">
                        <input type="text" id="studentSearch" placeholder="搜索学生姓名或学号..." oninput="filterStudents()">
                    </div>

                    <!-- 全选工具栏 -->
                    <div class="selection-toolbar">
                        <div class="selection-count">
                            已选择 <strong id="selectedCount">0</strong> 人 / 共 <strong id="totalCount">0</strong> 人
                        </div>
                        <button class="btn-select-all" onclick="toggleSelectAll()">全选</button>
                    </div>

                    <!-- 学生列表 -->
                    <div class="student-selection" id="studentSelection">
                        <!-- 动态渲染学生列表 -->
                    </div>
                </div>

                <!-- 按钮组 -->
                <div class="form-actions">
                    <button class="btn btn-default" onclick="goBack()">取消</button>
                    <button class="btn btn-primary" onclick="savePaper()">确认添加</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 实训试卷数据（来自教师端_实训试卷库.html）
        const paperData = [
            { id: 1, name: '数控车床操作实训考核', course: '数控车床', questions: 5, score: 100, duration: '120分钟', useCount: 3, createTime: '2025-01-15' },
            { id: 2, name: '数控铣床编程实训测试', course: '数控铣床', questions: 4, score: 100, duration: '90分钟', useCount: 2, createTime: '2025-01-14' },
            { id: 3, name: '机械制图CAD实训考核', course: '机械制图', questions: 3, score: 50, duration: '60分钟', useCount: 1, createTime: '2025-01-13' },
            { id: 4, name: '模具设计综合实训', course: '模具设计', questions: 6, score: 100, duration: '150分钟', useCount: 0, createTime: '2025-01-12' },
            { id: 5, name: '车削加工工艺实训', course: '数控车床', questions: 4, score: 80, duration: '90分钟', useCount: 0, createTime: '2025-01-11' }
        ];

        // 学生数据
        const studentData = [
            { id: '2024001', name: '张三', class: '机械2301班', selected: false },
            { id: '2024002', name: '李四', class: '机械2301班', selected: false },
            { id: '2024003', name: '王五', class: '机械2301班', selected: false },
            { id: '2024004', name: '赵六', class: '机械2301班', selected: false },
            { id: '2024005', name: '钱七', class: '机械2301班', selected: false },
            { id: '2024006', name: '孙八', class: '机械2302班', selected: false },
            { id: '2024007', name: '周九', class: '机械2302班', selected: false },
            { id: '2024008', name: '吴十', class: '机械2302班', selected: false },
            { id: '2024009', name: '郑十一', class: '数控2301班', selected: false },
            { id: '2024010', name: '陈十二', class: '数控2301班', selected: false },
            { id: '2024011', name: '刘十三', class: '数控2301班', selected: false },
            { id: '2024012', name: '黄十四', class: '模具2301班', selected: false }
        ];

        let selectedPaperId = null;
        let tempSelectedPaperId = null;
        let filteredStudents = [...studentData];
        let filteredPapers = [...paperData];

        // 获取URL参数
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            const courseName = getQueryParam('course') || '机械制图';
            document.getElementById('courseName').textContent = courseName;
            document.title = '添加实训试卷 - ' + courseName;

            renderStudentList();
            updateSelectionCount();
        });

        // 打开试卷选择弹窗
        function openPaperDialog() {
            tempSelectedPaperId = selectedPaperId;
            filteredPapers = [...paperData];
            document.getElementById('paperDialogSearch').value = '';
            renderPaperDialogList();
            document.getElementById('paperDialogOverlay').classList.add('active');
        }

        // 关闭试卷选择弹窗
        function closePaperDialog() {
            document.getElementById('paperDialogOverlay').classList.remove('active');
        }

        // 渲染试卷弹窗列表
        function renderPaperDialogList() {
            const container = document.getElementById('paperDialogList');
            container.innerHTML = filteredPapers.map(paper => `
                <div class="paper-dialog-item ${paper.id === tempSelectedPaperId ? 'selected' : ''}" onclick="selectPaperInDialog(${paper.id})" data-paper-id="${paper.id}">
                    <input type="radio" name="dialogPaper" value="${paper.id}" ${paper.id === tempSelectedPaperId ? 'checked' : ''} onchange="updateDialogPaperStyle(this)">
                    <div class="paper-dialog-info">
                        <div class="paper-dialog-name">${paper.name}</div>
                        <div class="paper-dialog-meta">
                            <span>${paper.course}</span>
                            <span>${paper.questions}题</span>
                            <span>${paper.score}分</span>
                            <span>${paper.duration}</span>
                            <span>使用${paper.useCount}次</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 在弹窗中选择试卷
        function selectPaperInDialog(paperId) {
            tempSelectedPaperId = paperId;
            const radio = document.querySelector(`input[name="dialogPaper"][value="${paperId}"]`);
            if (radio) {
                radio.checked = true;
                updateDialogPaperStyle(radio);
            }
        }

        // 更新弹窗中试卷样式
        function updateDialogPaperStyle(radio) {
            document.querySelectorAll('.paper-dialog-item').forEach(item => {
                item.classList.remove('selected');
            });
            const item = radio.closest('.paper-dialog-item');
            if (item) {
                item.classList.add('selected');
            }
        }

        // 筛选试卷
        function filterPapers() {
            const keyword = document.getElementById('paperDialogSearch').value.toLowerCase();
            filteredPapers = paperData.filter(paper => 
                paper.name.toLowerCase().includes(keyword) || 
                paper.course.toLowerCase().includes(keyword)
            );
            renderPaperDialogList();
        }

        // 确认试卷选择
        function confirmPaperSelection() {
            if (!tempSelectedPaperId) {
                alert('请选择实训试卷');
                return;
            }
            selectedPaperId = tempSelectedPaperId;
            const selectedPaper = paperData.find(p => p.id === selectedPaperId);
            
            // 更新选择器显示
            const selectorInput = document.getElementById('paperSelectorInput');
            selectorInput.innerHTML = `
                <span class="value">${selectedPaper.name}</span>
                <span style="color: #999;">▼</span>
            `;
            selectorInput.classList.add('has-value');
            
            closePaperDialog();
        }

        // 渲染学生列表
        function renderStudentList() {
            const container = document.getElementById('studentSelection');
            container.innerHTML = filteredStudents.map(student => `
                <div class="student-option ${student.selected ? 'selected' : ''}" onclick="toggleStudent('${student.id}')" data-student-id="${student.id}">
                    <input type="checkbox" ${student.selected ? 'checked' : ''} onchange="updateStudentStyle(this)" onclick="event.stopPropagation()">
                    <div class="student-info">
                        <div class="student-name">${student.name}</div>
                        <div class="student-class">${student.id} | ${student.class}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('totalCount').textContent = studentData.length;
        }

        // 切换学生选择
        function toggleStudent(studentId) {
            const student = studentData.find(s => s.id === studentId);
            if (student) {
                student.selected = !student.selected;
                renderStudentList();
                updateSelectionCount();
            }
        }

        // 更新学生样式
        function updateStudentStyle(checkbox) {
            const studentId = checkbox.closest('.student-option').dataset.studentId;
            const student = studentData.find(s => s.id === studentId);
            if (student) {
                student.selected = checkbox.checked;
                renderStudentList();
                updateSelectionCount();
            }
        }

        // 筛选学生
        function filterStudents() {
            const keyword = document.getElementById('studentSearch').value.toLowerCase();
            const selectedClasses = getSelectedClasses();

            filteredStudents = studentData.filter(student => {
                const matchesKeyword = student.name.toLowerCase().includes(keyword) ||
                                     student.id.toLowerCase().includes(keyword) ||
                                     student.class.toLowerCase().includes(keyword);
                // 如果没有选择任何班级，显示所有学生；否则只显示选中班级的学生
                const matchesClass = selectedClasses.length === 0 || selectedClasses.includes(student.class);
                return matchesKeyword && matchesClass;
            });
            renderStudentList();
        }

        // 获取选中的班级列表
        function getSelectedClasses() {
            const checkboxes = document.querySelectorAll('#classSelectorContainer input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // 根据班级筛选学生
        function filterStudentsByClass() {
            const selectedClasses = getSelectedClasses();

            // 自动勾选所有选中班级的学生
            studentData.forEach(student => {
                if (selectedClasses.includes(student.class)) {
                    student.selected = true;
                }
            });

            filterStudents();
            updateSelectionCount();
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const allSelected = studentData.every(s => s.selected);
            studentData.forEach(student => {
                student.selected = !allSelected;
            });
            filteredStudents = [...studentData];
            document.getElementById('studentSearch').value = '';
            renderStudentList();
            updateSelectionCount();
        }

        // 更新选择计数
        function updateSelectionCount() {
            const selectedCount = studentData.filter(s => s.selected).length;
            document.getElementById('selectedCount').textContent = selectedCount;
        }

        // 保存试卷
        function savePaper() {
            // 验证选择
            if (!selectedPaperId) {
                alert('请选择实训试卷');
                return;
            }

            const selectedStudents = studentData.filter(s => s.selected);
            if (selectedStudents.length === 0) {
                alert('请至少选择一个发布对象（学生）');
                return;
            }

            // 获取选中的试卷
            const selectedPaper = paperData.find(p => p.id === selectedPaperId);

            // 构建数据
            const paperAssignment = {
                paperId: selectedPaperId,
                paperName: selectedPaper.name,
                course: selectedPaper.course,
                targetStudents: selectedStudents.map(s => ({
                    id: s.id,
                    name: s.name,
                    class: s.class
                })),
                assignTime: new Date().toISOString(),
                status: '已发布'
            };

            // 保存到本地存储
            let assignments = JSON.parse(localStorage.getItem('trainingPaperAssignments') || '[]');
            assignments.push(paperAssignment);
            localStorage.setItem('trainingPaperAssignments', JSON.stringify(assignments));

            // 显示成功信息
            alert(`实训试卷"${selectedPaper.name}"添加成功！\n发布对象：${selectedStudents.length}名学生\n${selectedStudents.map(s => s.name).join('、')}`);

            // 返回课程详情页
            goBack();
        }

        // 返回课程详情
        function goBack() {
            const courseName = getQueryParam('course') || '机械制图';
            window.location.href = `./教师端_课程详情.html?name=${encodeURIComponent(courseName)}`;
        }

        // 菜单展开/收起
        function toggleMenu(element) {
            element.classList.toggle('collapsed');
            const menuItems = element.nextElementSibling;
            if (menuItems && menuItems.classList.contains('menu-items')) {
                menuItems.classList.toggle('collapsed');
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('iBodaoUser');
            window.location.href = './教学实训平台_登录.html';
        }
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
</html>
