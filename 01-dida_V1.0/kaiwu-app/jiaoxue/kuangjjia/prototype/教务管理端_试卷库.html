        /* 试卷类型标签 */
        .type-tag { 
            display: inline-flex; 
            align-items: center;
            padding: 3px 10px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 500;
            border: 1px solid transparent;
        }
        .type-normal { background: #E6F7FF; color: #1890FF; border-color: #91D5FF; }
        .type-practice { background: #F6FFED; color: #52C41A; border-color: #B7EB8F; }
        .type-mixed { background: linear-gradient(135deg, #E6F7FF 0%, #F6FFED 100%); color: #722ED1; border-color: #D3ADF7; }
        
        /* 状态标签 */
        .status-tag { 
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 12px;
            font-weight: 500;
        }
        .status-tag::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .status-published { background: #F6FFED; color: #52C41A; }
        .status-published::before { background: #52C41A; }
        .status-draft { background: #F5F5F5; color: #666; }
        .status-draft::before { background: #999; }
        .status-archived { background: #FFF1F0; color: #FF4D4F; }
        .status-archived::before { background: #FF4D4F; }

        /* 内容区域边距 */
        .content-area {
            padding: 16px !important;
        }

        /* 统计卡片间距 */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px !important;
        }

        /* 筛选条件模块 */
        .filter-section {
            margin-bottom: 16px !important;
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(99,102,241,0.06);
        }

        /* 批量操作栏 */
        .batch-operation-bar {
            margin-bottom: 16px !important;
        }

        /* 表格区域 */
        .table-section {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(99,102,241,0.06);
            overflow: hidden;
        }
        .table-section .data-table {
            border-radius: 12px;
            box-shadow: none;
            border: none;
            overflow: hidden;
        }
        .table-section .pagination {
            border-top: 1px solid #F0F0F0;
            background: transparent;
            padding: 16px 0 0 0;
            margin-top: 16px;
        }

        /* 统计卡片样式 */
        .stat-card {
            flex: 1;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card.blue { border-left: 4px solid #1890FF; }
        .stat-card.green { border-left: 4px solid #52C41A; }
        .stat-card.orange { border-left: 4px solid #FA8C16; }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .stat-card.blue .stat-icon { background: #E6F7FF; }
        .stat-card.green .stat-icon { background: #F6FFED; }
        .stat-card.orange .stat-icon { background: #FFF7E6; }
        .stat-info h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
            font-weight: normal;
        }
        .stat-info .number {
            font-size: 28px;
            font-weight: 600;
            color: #333;
        }

        /* 批量操作栏 */
        .batch-operation-bar {
            background: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(99,102,241,0.02) 100%);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .batch-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .batch-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #1e293b;
        }
        .batch-info {
            font-size: 13px;
            color: #64748b;
        }
        .batch-info strong {
            color: #6366f1;
            font-weight: 600;
        }
        .batch-right {
            display: flex;
            gap: 8px;
        }
        .btn-batch {
            padding: 6px 14px;
            border: 1px solid rgba(99,102,241,0.2);
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #64748b;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-batch:hover {
            border-color: #6366f1;
            color: #6366f1;
            background: rgba(99,102,241,0.04);
            transform: translateY(-1px);
        }
        .btn-batch.danger:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239,68,68,0.04);
        }

        /* 学生列表链接样式 */
        .student-count-link {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .student-count-link:hover {
            text-decoration: underline;
        }

        /* 对话框样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-container {
            background: #fff;
            border-radius: 12px;
            width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f3f4f6;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #6b7280;
            transition: all 0.2s ease;
        }
        .modal-close:hover {
            background: #e5e7eb;
            color: #374151;
        }
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-table {
            width: 100%;
            border-collapse: collapse;
        }
        .modal-table th,
        .modal-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .modal-table th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
            font-size: 13px;
        }
        .modal-table td {
            color: #4b5563;
            font-size: 14px;
        }
        .modal-table tr:hover td {
            background: #f9fafb;
        }
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: flex-end;
        }
        .btn-modal {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-modal-primary {
            background: #6366f1;
            color: #fff;
        }
        .btn-modal-primary:hover {
            background: #4f46e5;
        }

        /* 时间信息对话框 */
        .time-info-content {
            padding: 20px;
        }
        .time-info-item {
            display: flex;
            margin-bottom: 16px;
        }
        .time-info-item:last-child {
            margin-bottom: 0;
        }
        .time-info-label {
            width: 100px;
            color: #6b7280;
            font-size: 14px;
        }
        .time-info-value {
            flex: 1;
            color: #1e293b;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>

                <div class="tree-search">

                <div class="tree-content" id="treeContent"></div>
            </div>

            <!-- 右侧内容区 -->
            <div class="content-area">

                            <div class="number">156</div>

                    </div>
                </div>

                <!-- 筛选区域 -->
                <div class="filter-section">
                    <div class="filter-header">

                            <i class="iconfont icon-shaixuan"></i>
                            筛选条件
                        </div>
                        <button class="filter-toggle" id="filterToggle" onclick="FilterSection.toggle(this)">
                            <span class="toggle-text">收起</span>
                            <span class="toggle-icon">
                                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <div id="filterRow" class="filter-row">
                        <!-- 筛选字段由 JS 动态生成 -->
                    </div>
                </div>

                <!-- 批量操作栏 -->
                <div class="batch-operation-bar" style="display: none !important;">
                    <div class="batch-left">
                        <label class="batch-checkbox">
                            <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                            <span>全选</span>
                        </label>
                        <span class="batch-info">已选择 <strong id="selectedCount">0</strong> 项</span>
                    </div>
                    <div class="batch-right">
                        <button class="btn-batch" onclick="batchExport()">
                            <i class="iconfont icon-xiazai"></i> 批量导出
                        </button>
                        <button class="btn-batch danger" onclick="batchDelete()">
                            <i class="iconfont icon-shanchu"></i> 批量删除
                        </button>
                    </div>
                </div>

                <!-- 数据表格容器 -->
                <div class="table-section">
                    <div id="dataTable" class="data-table"></div>
                    <!-- 分页 -->
                    <div id="pagination" class="pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 学生列表对话框 -->
    <div class="modal-overlay" id="studentModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">参与学生列表</h3>
                <button class="modal-close" onclick="closeStudentModal()">×</button>
            </div>
            <div class="modal-body">
                <table class="modal-table">
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>学号</th>
                            <th>班级名称</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-primary" onclick="closeStudentModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 上课时间信息对话框 -->
    <div class="modal-overlay" id="timeModal">
        <div class="modal-container" style="width: 400px;">
            <div class="modal-header">
                <h3 class="modal-title">上课时间信息</h3>
                <button class="modal-close" onclick="closeTimeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="time-info-content">
                    <div class="time-info-item">
                        <span class="time-info-label">上课日期：</span>
                        <span class="time-info-value" id="timeDate">-</span>
                    </div>
                    <div class="time-info-item">
                        <span class="time-info-label">上课时间段：</span>
                        <span class="time-info-value" id="timeSlot">-</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-primary" onclick="closeTimeModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 查看任务详情对话框 -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal-container" style="width: 700px;">
            <div class="modal-header">
                <h3 class="modal-title">任务详情</h3>
                <button class="modal-close" onclick="closeViewModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="viewContent">
                    <!-- 动态生成内容 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-primary" onclick="closeViewModal()">关闭</button>
            </div>
        </div>
    </div>

            { 
                type: 'select', 
                label: '所属课程', 
                name: 'course',
                options: [
                    { value: '', label: '全部课程' },
                    { value: '机械制图', label: '机械制图' },
                    { value: '数控加工技术', label: '数控加工技术' },
                    { value: '综合实训', label: '综合实训' },
                    { value: 'AutoCAD', label: 'AutoCAD' },
                    { value: '电气控制', label: '电气控制' }
                ]
            }
        ];

        // ==================== 表格列配置 ====================
        const columns = [
            { 
                title: '序号', 
                dataIndex: 'id', 
                width: 60,
                render: (val, row) => `${val}`
            },
            { 
                title: '试卷名称',
                dataIndex: 'name',
                width: 200,
                render: (val) => `<span style="color: #1e293b; font-weight: 500;">${val}</span>`
            },
            {
                title: '类型',
                dataIndex: 'typeName',
                width: 100,
                render: (val, row) => {
                    const typeClass = {
                        '普通试卷': 'type-normal',
                        '实训试卷': 'type-practice',
                        '混合试卷': 'type-mixed'
                    }[val] || 'type-normal';
                    return `<span class="type-tag ${typeClass}">${val}</span>`;
                },
                visible: false
            },
            { title: '分数', dataIndex: 'score', width: 80, render: (val) => `${val}分` },
            { title: '所属课程', dataIndex: 'course', width: 120 },
            { title: '任课教师', dataIndex: 'teacher', width: 100 },
            { 
                title: '参与人数', 
                dataIndex: 'participants', 
                width: 90, 
                render: (val, row) => `<a href="javascript:void(0)" class="student-count-link" onclick="showStudentList(${row.id}, ${val})" title="点击查看学生列表">${val}人</a>` 
            },
            { 
                title: '上课时间', 
                dataIndex: 'times', 
                width: 90, 
                render: (val, row) => `<a href="javascript:void(0)" class="time-link" data-times="${JSON.stringify(row.times).replace(/"/g, '&quot;')}" onclick="showTimeInfoFromElement(this)" style="color: #6366f1; text-decoration: none; font-weight: 500;">查看</a>` 
            },
            { title: '上课教室', dataIndex: 'classroom', width: 140 },
            { title: '更新人', dataIndex: 'updater', width: 100 },
            { title: '更新时间', dataIndex: 'updateTime', width: 150 },
            {
                title: '状态',
                dataIndex: 'statusName',
                width: 90,
                render: (val) => {
                    const statusClass = {
                        '已发布': 'status-published',
                        '草稿': 'status-draft',
                        '已归档': 'status-archived'
                    }[val] || 'status-draft';
                    return `<span class="status-tag ${statusClass}">${val}</span>`;
                }
            },
            {
                title: '操作',
                width: 100,
                render: (val, row) => {
                    return `<button class="btn-batch" onclick="viewPaper(${row.id})" style="padding: 4px 12px; font-size: 12px;">查看</button>`;
                }
            }
        ];

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化筛选组件
            FilterSection.init({
                containerId: 'filterRow',
                fields: filterFields,
                onSearch: (values) => {
                    console.log('筛选条件:', values);
                    filterPapers(values);
                },
                onReset: () => {
                    DataTable.setData(paperData);
                }
            });

            // 初始化表格
            DataTable.init({
                containerId: 'dataTable',
                columns: columns,
                data: paperData,
                fixedFirstColumn: true,
                fixedLastColumn: true
            });

            // 初始化分页
            Pagination.init({
                containerId: 'pagination',
                total: paperData.length,
                pageSize: 10,
                current: 1,
                onChange: (page) => {
                    console.log('切换到第', page, '页');
                }
            });
        });

        // ==================== 筛选功能 ====================
        function filterPapers(values) {
            let filtered = paperData;
            
            if (values.name) {
                filtered = filtered.filter(item => item.name.includes(values.name));
            }
            if (values.type) {
                filtered = filtered.filter(item => item.type === values.type);
            }
            if (values.status) {
                filtered = filtered.filter(item => item.status === values.status);
            }
            if (values.course) {
                filtered = filtered.filter(item => item.course === values.course);
            }
            
            DataTable.setData(filtered);
            Pagination.updateTotal(filtered.length);
        }

        // ==================== 批量操作 ====================
        let selectedItems = [];

        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            const selectAllCheckbox = document.getElementById('selectAll');
            checkboxes.forEach(cb => {
                cb.checked = selectAllCheckbox.checked;
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const checkboxes = document.querySelectorAll('.row-checkbox:checked');
            selectedItems = Array.from(checkboxes).map(cb => cb.value);
            document.getElementById('selectedCount').textContent = selectedItems.length;
            
            const batchBar = document.querySelector('.batch-operation-bar');
            if (selectedItems.length > 0) {
                batchBar.style.display = 'flex';
            } else {
                batchBar.style.display = 'none';
            }
        }

        function batchExport() {
            if (selectedItems.length === 0) {
                alert('请先选择要导出的试卷');
                return;
            }
            alert(`导出 ${selectedItems.length} 份试卷`);
        }

        function batchDelete() {
            if (selectedItems.length === 0) {
                alert('请先选择要删除的试卷');
                return;
            }
            if (confirm(`确定要删除选中的 ${selectedItems.length} 份试卷吗？`)) {
                alert('删除成功');
                selectedItems = [];
                document.querySelector('.batch-operation-bar').style.display = 'none';
                DataTable.setData(paperData);
            }
        }

        // ==================== 学生列表对话框 ====================
        // 模拟学生数据
        const studentData = {
            1: [
                { name: '张三', studentNo: '202301001', className: '机械2301班' },
                { name: '李四', studentNo: '202301002', className: '机械2301班' },
                { name: '王五', studentNo: '202301003', className: '机械2301班' },
                { name: '赵六', studentNo: '202301004', className: '机械2302班' },
                { name: '钱七', studentNo: '202301005', className: '机械2302班' }
            ],
            2: [
                { name: '孙八', studentNo: '202302001', className: '数控2301班' },
                { name: '周九', studentNo: '202302002', className: '数控2301班' },
                { name: '吴十', studentNo: '202302003', className: '数控2302班' }
            ],
            3: [
                { name: '郑一', studentNo: '202303001', className: '机电2301班' },
                { name: '陈二', studentNo: '202303002', className: '机电2301班' },
                { name: '刘三', studentNo: '202303003', className: '机电2302班' },
                { name: '黄四', studentNo: '202303004', className: '机电2302班' }
            ]
        };

        function showStudentList(paperId, count) {
            const modal = document.getElementById('studentModal');
            const tbody = document.getElementById('studentTableBody');
            
            // 获取学生数据（如果没有则生成模拟数据）
            let students = studentData[paperId];
            if (!students) {
                students = generateMockStudents(count, paperId);
            }
            
            // 生成表格内容
            tbody.innerHTML = students.map(student => `
                <tr>
                    <td>${student.name}</td>
                    <td>${student.studentNo}</td>
                    <td>${student.className}</td>
                </tr>
            `).join('');
            
            // 更新标题显示人数
            document.querySelector('#studentModal .modal-title').textContent = `参与学生列表（共${students.length}人）`;
            
            modal.classList.add('active');
        }

        function closeStudentModal() {
            document.getElementById('studentModal').classList.remove('active');
        }

        // 生成模拟学生数据
        function generateMockStudents(count, paperId) {
            const surnames = ['张', '李', '王', '赵', '钱', '孙', '周', '吴', '郑', '陈', '刘', '黄', '杨', '林', '何'];
            const names = ['伟', '芳', '娜', '敏', '静', '丽', '强', '磊', '军', '洋', '勇', '艳', '杰', '娟', '涛'];
            const classes = ['机械2301班', '机械2302班', '数控2301班', '数控2302班', '机电2301班', '机电2302班'];
            
            const students = [];
            for (let i = 0; i < count; i++) {
                const surname = surnames[Math.floor(Math.random() * surnames.length)];
                const name = names[Math.floor(Math.random() * names.length)];
                const className = classes[Math.floor(Math.random() * classes.length)];
                students.push({
                    name: surname + name,
                    studentNo: `2023${String(paperId).padStart(2, '0')}${String(i + 1).padStart(3, '0')}`,
                    className: className
                });
            }
            return students;
        }

        // ==================== 上课时间信息对话框 ====================
        function showTimeInfo(times) {
            const modal = document.getElementById('timeModal');
            const modalBody = modal.querySelector('.modal-body');
            
            // 按日期分组，优化展示结构
            const groupedTimes = {};
            times.forEach(time => {
                if (!groupedTimes[time.date]) {
                    groupedTimes[time.date] = [];
                }
                groupedTimes[time.date].push(time.timeSlot);
            });
            
            // 生成表格HTML
            let tableHTML = `
                <table class="modal-table">
                    <thead>
                        <tr>
                            <th>上课日期</th>
                            <th>上课时间段</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            // 按日期分组展示
            Object.entries(groupedTimes).forEach(([date, timeSlots]) => {
                timeSlots.forEach((timeSlot, index) => {
                    tableHTML += `
                        <tr>
                            ${index === 0 ? `<td rowspan="${timeSlots.length}" style="vertical-align: middle;">${date}</td>` : ''}
                            <td>${timeSlot}</td>
                        </tr>
                    `;
                });
            });
            
            tableHTML += `
                    </tbody>
                </table>
            `;
            
            modalBody.innerHTML = tableHTML;
            modal.classList.add('active');
        }

        function closeTimeModal() {
            document.getElementById('timeModal').classList.remove('active');
        }

        // 从元素获取时间数据并显示
        function showTimeInfoFromElement(element) {
            const timesJson = element.getAttribute('data-times');
            const times = JSON.parse(timesJson);
            showTimeInfo(times);
        }

        // 查看任务详情
        function viewPaper(paperId) {
            const paper = paperData.find(item => item.id === paperId);
            if (paper) {
                const content = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div>
                            <p style="font-size: 14px; color: #666; margin-bottom: 4px;">任务名称</p>
                            <p style="font-size: 16px; color: #333; font-weight: 500;">${paper.name}</p>
                        </div>
                        <div>
                            <p style="font-size: 14px; color: #666; margin-bottom: 4px;">所属课程</p>
                            <p style="font-size: 16px; color: #333;">${paper.course}</p>
                        </div>
                        <div>
                            <p style="font-size: 14px; color: #666; margin-bottom: 4px;">任课教师</p>
                            <p style="font-size: 16px; color: #333;">${paper.teacher}</p>
                        </div>
                        <div>
                            <p style="font-size: 14px; color: #666; margin-bottom: 4px;">参与人数</p>
                            <p style="font-size: 16px; color: #333;">${paper.participants}人</p>
                        </div>
                        <div style="grid-column: 1 / 3;">
                            <p style="font-size: 14px; color: #666; margin-bottom: 4px;">上课时间</p>
                            <div style="font-size: 14px; color: #333;">
                                ${paper.times.map(time => `${time.date} ${time.timeSlot}`).join('<br>')}
                            </div>
                        </div>
                        <div>
                            <p style="font-size: 14px; color: #666; margin-bottom: 4px;">上课教室</p>
                            <p style="font-size: 16px; color: #333;">${paper.classroom}</p>
                        </div>
                        <div>
                            <p style="font-size: 14px; color: #666; margin-bottom: 4px;">分数</p>
                            <p style="font-size: 16px; color: #333;">${paper.score}分</p>
                        </div>
                        <div>
                            <p style="font-size: 14px; color: #666; margin-bottom: 4px;">状态</p>
                            <p style="font-size: 16px; color: ${paper.status === 'published' ? '#52C41A' : paper.status === 'draft' ? '#666' : '#FF4D4F'};">
                                ${paper.statusName}
                            </p>
                        </div>
                        <div>
                            <p style="font-size: 14px; color: #666; margin-bottom: 4px;">更新人</p>
                            <p style="font-size: 16px; color: #333;">${paper.updater}</p>
                        </div>
                        <div style="grid-column: 1 / 3;">
                            <p style="font-size: 14px; color: #666; margin-bottom: 4px;">更新时间</p>
                            <p style="font-size: 16px; color: #333;">${paper.updateTime}</p>
                        </div>
                    </div>
                `;
                document.getElementById('viewContent').innerHTML = content;
                document.getElementById('viewModal').classList.add('active');
            }
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
        }

        // 点击遮罩层关闭对话框
        document.getElementById('studentModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeStudentModal();
            }
        });
        document.getElementById('timeModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeTimeModal();
            }
        });
        document.getElementById('viewModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeViewModal();
            }
        });
    </script>
</body>
</html>
