<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刀具类型管理 - 教师端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 页面头部 */
        .page-header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: #1890FF;
            border-radius: 2px;
        }
        
        /* 工具栏 */
        .toolbar {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .filter-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-item label {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
        }
        .filter-item input,
        .filter-item select {
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 13px;
            min-width: 140px;
        }
        
        /* 按钮样式 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #1890FF;
            color: #fff;
        }
        .btn-primary:hover { background: #40A9FF; }
        .btn-success {
            background: #52C41A;
            color: #fff;
        }
        .btn-success:hover { background: #73D13D; }
        .btn-default {
            background: #fff;
            color: #666;
            border: 1px solid #D9D9D9;
        }
        .btn-default:hover {
            border-color: #1890FF;
            color: #1890FF;
        }
        .btn-danger {
            background: #FF4D4F;
            color: #fff;
        }
        .btn-danger:hover { background: #FF7875; }
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }
        
        /* 内容区 */
        .content-body {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
        }
        
        /* 树形表格布局 */
        .tree-table-container {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #E8E8E8;
            overflow: hidden;
        }
        .tree-table {
            width: 100%;
            border-collapse: collapse;
        }
        .tree-table th {
            background: #FAFAFA;
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #E8E8E8;
        }
        .tree-table td {
            padding: 12px 16px;
            font-size: 13px;
            color: #666;
            border-bottom: 1px solid #F0F0F0;
        }
        .tree-table tbody tr:hover {
            background: #F6FFFE;
        }
        
        /* 树形展开图标 */
        .tree-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            cursor: pointer;
            color: #999;
            transition: all 0.3s;
        }
        .tree-icon:hover {
            color: #1890FF;
        }
        .tree-icon.expanded {
            transform: rotate(90deg);
        }
        .tree-level-1 { padding-left: 16px; }
        .tree-level-2 { padding-left: 40px; }
        .tree-level-3 { padding-left: 64px; }
        
        /* 状态标签 */
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-enabled {
            background: #F6FFED;
            color: #52C41A;
            border: 1px solid #B7EB8F;
        }
        .status-disabled {
            background: #FFF2F0;
            color: #FF4D4F;
            border: 1px solid #FFA39E;
        }
        
        /* 操作按钮组 */
        .action-group {
            display: flex;
            gap: 8px;
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px 20px;
            gap: 8px;
            background: #fff;
            border-top: 1px solid #E8E8E8;
        }
        .pagination-btn {
            padding: 6px 12px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .pagination-btn:hover {
            border-color: #1890FF;
            color: #1890FF;
        }
        .pagination-btn.active {
            background: #1890FF;
            color: #fff;
            border-color: #1890FF;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: #fff;
            border-radius: 12px;
            width: 90%;
            max-width: 560px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-close {
            font-size: 24px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            background: none;
            border: none;
            transition: all 0.3s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
        .modal-close:hover {
            color: #fff;
            background: rgba(255,255,255,0.2);
        }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #F0F0F0;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: #FAFAFA;
        }
        
        /* 表单样式 */
        .form-item {
            margin-bottom: 20px;
        }
        .form-item label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-item label span {
            color: #FF4D4F;
        }
        .form-item input,
        .form-item select,
        .form-item textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
            background: #FAFAFA;
        }
        .form-item input:focus,
        .form-item select:focus,
        .form-item textarea:focus {
            outline: none;
            border-color: #1890FF;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(24,144,255,0.1);
        }
        .form-item textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-row {
            display: flex;
            gap: 20px;
        }
        .form-row .form-item {
            flex: 1;
        }
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>
    

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 页面头部 -->
        <div class="page-header">
            <div class="page-title">刀具类型管理</div>
        </div>
        
        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="filter-group">
                <div class="filter-item">
                    <label>类型名称</label>
                    <input type="text" placeholder="请输入类型名称">
                </div>
                <div class="filter-item">
                    <label>状态</label>
                    <select>
                        <option value="">全部</option>
                        <option value="enabled">启用</option>
                        <option value="disabled">禁用</option>
                    </select>
                </div>
                <button class="btn btn-primary">
                    <i class="iconfont icon-sousuo"></i> 查询
                </button>
                <button class="btn btn-default">重置</button>
            </div>
            <div class="action-group">
                <button class="btn btn-success" onclick="openModal()">
                    <i class="iconfont icon-add"></i> 新增类型
                </button>
            </div>
        </div>
        
        <!-- 内容区 -->
        <div class="content-body">
            <div class="tree-table-container">
                <table class="tree-table">
                    <thead>
                        <tr>
                            <th style="width: 40%;">类型名称</th>
                            <th style="width: 15%;">类型编码</th>
                            <th style="width: 15%;">排序</th>
                            <th style="width: 15%;">状态</th>
                            <th style="width: 15%;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <span class="tree-icon expanded" onclick="toggleRow(this)">▶</span>
                                <strong>铣刀</strong>
                            </td>
                            <td>XD</td>
                            <td>1</td>
                            <td><span class="status-tag status-enabled">启用</span></td>
                            <td>
                                <button class="btn btn-primary btn-sm">编辑</button>
                                <button class="btn btn-danger btn-sm">删除</button>
                            </td>
                        </tr>
                        <tr class="tree-level-1">
                            <td>
                                <span class="tree-icon" onclick="toggleRow(this)">▶</span>
                                立铣刀
                            </td>
                            <td>XD-LXD</td>
                            <td>1</td>
                            <td><span class="status-tag status-enabled">启用</span></td>
                            <td>
                                <button class="btn btn-primary btn-sm">编辑</button>
                                <button class="btn btn-danger btn-sm">删除</button>
                            </td>
                        </tr>
                        <tr class="tree-level-2">
                            <td>整体立铣刀</td>
                            <td>XD-LXD-ZT</td>
                            <td>1</td>
                            <td><span class="status-tag status-enabled">启用</span></td>
                            <td>
                                <button class="btn btn-primary btn-sm">编辑</button>
                                <button class="btn btn-danger btn-sm">删除</button>
                            </td>
                        </tr>
                        <tr class="tree-level-2">
                            <td>可转位立铣刀</td>
                            <td>XD-LXD-KZW</td>
                            <td>2</td>
                            <td><span class="status-tag status-enabled">启用</span></td>
                            <td>
                                <button class="btn btn-primary btn-sm">编辑</button>
                                <button class="btn btn-danger btn-sm">删除</button>
                            </td>
                        </tr>
                        <tr class="tree-level-1">
                            <td>
                                <span class="tree-icon" onclick="toggleRow(this)">▶</span>
                                面铣刀
                            </td>
                            <td>XD-MXD</td>
                            <td>2</td>
                            <td><span class="status-tag status-enabled">启用</span></td>
                            <td>
                                <button class="btn btn-primary btn-sm">编辑</button>
                                <button class="btn btn-danger btn-sm">删除</button>
                            </td>
                        </tr>
                        <tr class="tree-level-2">
                            <td>可转位面铣刀</td>
                            <td>XD-MXD-KZW</td>
                            <td>1</td>
                            <td><span class="status-tag status-enabled">启用</span></td>
                            <td>
                                <button class="btn btn-primary btn-sm">编辑</button>
                                <button class="btn btn-danger btn-sm">删除</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <span class="tree-icon expanded" onclick="toggleRow(this)">▶</span>
                                <strong>钻头</strong>
                            </td>
                            <td>ZT</td>
                            <td>2</td>
                            <td><span class="status-tag status-enabled">启用</span></td>
                            <td>
                                <button class="btn btn-primary btn-sm">编辑</button>
                                <button class="btn btn-danger btn-sm">删除</button>
                            </td>
                        </tr>
                        <tr class="tree-level-1">
                            <td>麻花钻</td>
                            <td>ZT-MHZ</td>
                            <td>1</td>
                            <td><span class="status-tag status-enabled">启用</span></td>
                            <td>
                                <button class="btn btn-primary btn-sm">编辑</button>
                                <button class="btn btn-danger btn-sm">删除</button>
                            </td>
                        </tr>
                        <tr class="tree-level-1">
                            <td>中心钻</td>
                            <td>ZT-ZXZ</td>
                            <td>2</td>
                            <td><span class="status-tag status-disabled">禁用</span></td>
                            <td>
                                <button class="btn btn-primary btn-sm">编辑</button>
                                <button class="btn btn-danger btn-sm">删除</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <span class="tree-icon" onclick="toggleRow(this)">▶</span>
                                <strong>车刀</strong>
                            </td>
                            <td>CD</td>
                            <td>3</td>
                            <td><span class="status-tag status-enabled">启用</span></td>
                            <td>
                                <button class="btn btn-primary btn-sm">编辑</button>
                                <button class="btn btn-danger btn-sm">删除</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <!-- 分页 -->
                <div class="pagination">
                    <span style="font-size: 13px; color: #666; margin-right: 16px;">共 12 条记录</span>
                    <button class="pagination-btn">上一页</button>
                    <button class="pagination-btn active">1</button>
                    <button class="pagination-btn">2</button>
                    <button class="pagination-btn">下一页</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑模态框 -->
    <div class="modal" id="typeModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">
                    <i class="iconfont icon-daoju"></i>
                    <span id="modalTitle">新增刀具类型</span>
                </div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label>上级类型</label>
                    <select>
                        <option value="">作为一级类型</option>
                        <option value="xd">铣刀</option>
                        <option value="xd-lxd">-- 立铣刀</option>
                        <option value="xd-mxd">-- 面铣刀</option>
                        <option value="zt">钻头</option>
                        <option value="cd">车刀</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-item">
                        <label>类型编码 <span>*</span></label>
                        <input type="text" placeholder="请输入类型编码">
                    </div>
                    <div class="form-item">
                        <label>类型名称 <span>*</span></label>
                        <input type="text" placeholder="请输入类型名称">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-item">
                        <label>排序号</label>
                        <input type="number" placeholder="请输入排序号" value="1">
                    </div>
                    <div class="form-item">
                        <label>状态</label>
                        <select>
                            <option value="enabled">启用</option>
                            <option value="disabled">禁用</option>
                        </select>
                    </div>
                </div>
                <div class="form-item">
                    <label>备注</label>
                    <textarea placeholder="请输入备注信息"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-primary">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 菜单展开/收起
        function toggleMenu(element) {
            element.classList.toggle('collapsed');
            const menuItems = element.nextElementSibling;
            if (menuItems) {
                menuItems.classList.toggle('collapsed');
            }
        }

        // 页面加载时自动展开包含 active 菜单项的菜单组
        document.addEventListener('DOMContentLoaded', function() {
            const activeMenuItem = document.querySelector('.menu-item.active');
            if (activeMenuItem) {
                const menuItems = activeMenuItem.closest('.menu-items');
                if (menuItems) {
                    const menuTitle = menuItems.previousElementSibling;
                    if (menuTitle && menuTitle.classList.contains('menu-title')) {
                        menuTitle.classList.remove('collapsed');
                        menuItems.classList.remove('collapsed');
                    }
                }
            }
        });

        // 树形展开/收起
        function toggleRow(icon) {
            icon.classList.toggle('expanded');
            const row = icon.closest('tr');
            const level = row.className.match(/tree-level-(\d)/);
            if (level) {
                const currentLevel = parseInt(level[1]);
                let nextRow = row.nextElementSibling;
                while (nextRow) {
                    const nextLevel = nextRow.className.match(/tree-level-(\d)/);
                    if (nextLevel) {
                        const nl = parseInt(nextLevel[1]);
                        if (nl > currentLevel) {
                            nextRow.style.display = icon.classList.contains('expanded') ? '' : 'none';
                        } else {
                            break;
                        }
                    } else {
                        break;
                    }
                    nextRow = nextRow.nextElementSibling;
                }
            }
        }

        // 打开模态框
        function openModal() {
            document.getElementById('typeModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('typeModal').classList.remove('active');
        }

        // 点击模态框外部关闭
        document.getElementById('typeModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
</html>
