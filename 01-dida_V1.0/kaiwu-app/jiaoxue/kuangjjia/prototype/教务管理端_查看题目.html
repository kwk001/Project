<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查看题目 - 普通题库</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .breadcrumb {
            font-size: 14px;
            color: #666;
        }

        .breadcrumb span {
            color: #1890FF;
            cursor: pointer;
        }

        .breadcrumb span:hover {
            text-decoration: underline;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            color: #1890FF;
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #F0F2F5;
        }

        .btn-back {
            padding: 10px 20px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .form-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .form-card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .form-value {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }

        /* 选项区域 */
        .options-section {
            margin: 20px 0;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #F5F5F5;
        }

        .option-label {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #D9D9D9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            flex-shrink: 0;
        }

        .option-content {
            flex: 1;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }

        /* 答案和解析区域 */
        .answer-section {
            margin-top: 20px;
            padding: 16px;
            background: #F6FFED;
            border-radius: 8px;
            border: 1px solid #B7EB8F;
        }

        .answer-section label {
            display: block;
            font-size: 14px;
            color: #52C41A;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .analysis-section {
            margin-top: 20px;
            padding: 16px;
            background: #F5F7FA;
            border-radius: 8px;
            border: 1px solid #E8E8E8;
        }

        .analysis-section label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* 操作按钮 */
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #F0F0F0;
        }

        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-secondary {
            padding: 12px 24px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }

        .btn-secondary:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        /* 填空题样式 */
        .fill-blank {
            display: inline-block;
            width: 120px;
            height: 28px;
            border-bottom: 2px solid #1890FF;
            margin: 0 4px;
            vertical-align: middle;
        }

        /* 简答题样式 */
        .essay-answer {
            min-height: 120px;
            padding: 16px;
            border: 1px solid #E8E8E8;
            border-radius: 8px;
            background: #F9F9F9;
        }
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>
    
    <!-- 主内容区 -->
    <div class="main-content">
        <div class="header">
            <div class="breadcrumb">
                <span onclick="goBack()">普通题库</span> / 查看题目
            </div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>

        <div class="content-body">
            <button class="btn-back" onclick="goBack()">
                ← 返回列表
            </button>

            <!-- 基本信息 -->
            <div class="form-card">
                <div class="form-card-title">基本信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">所属课程</label>
                        <div class="form-value" id="questionCourse">Java程序设计</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">题型</label>
                        <div class="form-value" id="questionType">单选题</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">难度</label>
                        <div class="form-value" id="questionDifficulty">简单</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">更新人</label>
                        <div class="form-value" id="questionUpdater">张教授</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">更新时间</label>
                        <div class="form-value" id="questionUpdateTime">2026-03-11 11:22:25</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">使用次数</label>
                        <div class="form-value" id="questionUseCount">15次</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">最近使用</label>
                        <div class="form-value" id="questionLastUse">2026-03-20</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">知识点</label>
                        <div class="form-value" id="questionKnowledge">
                            <span style="display: inline-block; padding: 4px 12px; background: #E6F7FF; color: #1890FF; border-radius: 4px; font-size: 12px; margin-right: 8px; margin-bottom: 8px;">Java基础</span>
                            <span style="display: inline-block; padding: 4px 12px; background: #F6FFED; color: #52C41A; border-radius: 4px; font-size: 12px; margin-right: 8px; margin-bottom: 8px;">接口定义</span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">题目来源</label>
                        <div class="form-value" id="questionSource">原创</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">是否公用</label>
                        <div class="form-value" id="questionIsPublic">
                            <span style="display: inline-block; padding: 4px 12px; background: #F6FFED; color: #52C41A; border-radius: 4px; font-size: 12px;">是</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 题目内容 -->
            <div class="form-card">
                <div class="form-card-title">题目内容</div>
                <div class="form-group">
                    <label class="form-label">题干</label>
                    <div class="form-value" id="questionContent" style="line-height: 1.6; min-height: 80px;">Java中，以下哪个关键字用于定义接口？</div>
                </div>

                <!-- 选项区域（单选/多选） -->
                <div class="options-section" id="optionsSection">
                    <label class="form-label">选项设置</label>
                    <div class="option-item">
                        <div class="option-label">A</div>
                        <div class="option-content">class</div>
                    </div>
                    <div class="option-item">
                        <div class="option-label">B</div>
                        <div class="option-content">interface</div>
                    </div>
                    <div class="option-item">
                        <div class="option-label">C</div>
                        <div class="option-content">extends</div>
                    </div>
                    <div class="option-item">
                        <div class="option-label">D</div>
                        <div class="option-content">implements</div>
                    </div>
                </div>

                <!-- 正确答案 -->
                <div class="answer-section">
                    <label>正确答案</label>
                    <div class="form-value" id="answerContent">B</div>
                </div>

                <!-- 答案解析 -->
                <div class="analysis-section">
                    <label>答案解析</label>
                    <div class="form-value" id="analysisContent" style="line-height: 1.5;">
                        在Java中，使用interface关键字定义接口，class关键字用于定义类，extends关键字用于继承，implements关键字用于实现接口。
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="btn-group">
                    <button class="btn-secondary" onclick="goBack()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 题目数据
        const questionData = [
            { id: 1, content: 'Java中，以下哪个关键字用于定义接口？', course: 'Java程序设计', type: 'single', difficulty: 'easy', updater: '张教授', updateTime: '2026-03-11 11:22:25', options: ['class', 'interface', 'extends', 'implements'], answer: 'B', analysis: '在Java中，使用interface关键字定义接口，class关键字用于定义类，extends关键字用于继承，implements关键字用于实现接口。' },
            { id: 2, content: '以下哪些是Java的基本数据类型？', course: 'Java程序设计', type: 'multiple', difficulty: 'easy', updater: '李讲师', updateTime: '2026-03-11 10:15:30', options: ['int', 'String', 'boolean', 'Object'], answer: 'A,C', analysis: 'Java的基本数据类型包括byte、short、int、long、float、double、char、boolean。String和Object是引用类型。' },
            { id: 3, content: 'Java中的String类是不可变的。', course: '面向对象编程', type: 'judge', difficulty: 'medium', updater: '王教授', updateTime: '2026-03-10 16:45:18', answer: '正确', analysis: 'Java中的String类是不可变的，一旦创建就不能修改其内容。任何修改String的操作都会创建一个新的String对象。' },
            { id: 4, content: 'Java中，使用______关键字可以创建类的实例。', course: 'Java程序设计', type: 'fill', difficulty: 'easy', updater: '赵教授', updateTime: '2026-03-10 14:20:33', answer: 'new', analysis: '在Java中，使用new关键字可以创建类的实例，例如：ClassName obj = new ClassName();' },
            { id: 5, content: '以下哪个集合类是线程安全的？', course: 'Java高级特性', type: 'single', difficulty: 'hard', updater: '刘讲师', updateTime: '2026-03-10 09:30:45', options: ['ArrayList', 'HashMap', 'Vector', 'LinkedList'], answer: 'C', analysis: 'Vector是线程安全的集合类，而ArrayList、HashMap和LinkedList不是线程安全的。' }
        ];

        // 题型映射
        const typeMap = {
            'single': { label: '单选题' },
            'multiple': { label: '多选题' },
            'judge': { label: '判断题' },
            'fill': { label: '填空题' },
            'essay': { label: '简答题' }
        };

        // 难度映射
        const difficultyMap = {
            'easy': '简单',
            'medium': '中等',
            'hard': '困难'
        };

        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 初始化
        function init() {
            const questionId = getUrlParam('id');
            if (questionId) {
                loadQuestion(questionId);
            } else {
                // 默认加载第一个题目
                loadQuestion(1);
            }
        }

        // 加载题目
        function loadQuestion(id) {
            const question = questionData.find(item => item.id == id);
            if (question) {
                document.getElementById('questionType').textContent = typeMap[question.type].label;
                document.getElementById('questionContent').textContent = question.content;
                document.getElementById('questionCourse').textContent = question.course;
                document.getElementById('questionDifficulty').textContent = difficultyMap[question.difficulty];
                document.getElementById('questionUpdater').textContent = question.updater;
                document.getElementById('questionUpdateTime').textContent = question.updateTime;
                document.getElementById('questionUseCount').textContent = '15次'; // 模拟数据
                document.getElementById('questionLastUse').textContent = '2026-03-20'; // 模拟数据
                document.getElementById('questionSource').textContent = '原创'; // 模拟数据
                document.getElementById('answerContent').textContent = question.answer;
                document.getElementById('analysisContent').textContent = question.analysis;

                // 渲染是否公用
                const isPublicElement = document.getElementById('questionIsPublic');
                isPublicElement.innerHTML = '<span style="display: inline-block; padding: 4px 12px; background: #F6FFED; color: #52C41A; border-radius: 4px; font-size: 12px;">是</span>';

                // 渲染选项
                renderOptions(question);
            }
        }

        // 渲染选项
        function renderOptions(question) {
            const optionsSection = document.getElementById('optionsSection');
            if (question.type === 'single' || question.type === 'multiple') {
                if (question.options) {
                    optionsSection.innerHTML = `
                        <label class="form-label">选项设置</label>
                    ` + question.options.map((option, index) => {
                        const label = String.fromCharCode(65 + index); // A, B, C, D...
                        return `
                            <div class="option-item">
                                <div class="option-label">${label}</div>
                                <div class="option-content">${option}</div>
                            </div>
                        `;
                    }).join('');
                }
            } else if (question.type === 'judge') {
                optionsSection.innerHTML = `
                    <label class="form-label">选项设置</label>
                    <div class="option-item">
                        <div class="option-label">√</div>
                        <div class="option-content">正确</div>
                    </div>
                    <div class="option-item">
                        <div class="option-label">×</div>
                        <div class="option-content">错误</div>
                    </div>
                `;
            } else if (question.type === 'fill') {
                // 填空题不需要选项
                optionsSection.innerHTML = '';
            } else if (question.type === 'essay') {
                // 简答题不需要选项
                optionsSection.innerHTML = '';
                // 修改答案显示样式
                const answerContent = document.getElementById('answerContent');
                answerContent.style.minHeight = '120px';
                answerContent.style.padding = '16px';
                answerContent.style.border = '1px solid #E8E8E8';
                answerContent.style.borderRadius = '8px';
                answerContent.style.background = '#F9F9F9';
            }
        }

        // 返回列表
        function goBack() {
            window.location.href = './教务管理端_题库.html';
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('iBodaoUser');
            window.location.href = './教学实训平台_登录.html';
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-new.js"></script>
</body>
</html>
