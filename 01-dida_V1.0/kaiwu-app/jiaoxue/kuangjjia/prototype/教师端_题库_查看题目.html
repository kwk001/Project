<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查看题目 - 普通题库</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .breadcrumb {
            font-size: 14px;
            color: #666;
        }

        .breadcrumb span {
            color: #1890FF;
            cursor: pointer;
        }

        .breadcrumb span:hover {
            text-decoration: underline;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            color: #1890FF;
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #F0F2F5;
        }

        .btn-back {
            padding: 10px 20px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .form-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .form-card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .form-value {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }

        /* 选项区域 */
        .options-section {
            margin: 20px 0;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #F5F5F5;
        }

        .option-label {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #D9D9D9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            flex-shrink: 0;
        }

        .option-content {
            flex: 1;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }

        /* 答案和解析区域 */
        .answer-section {
            margin-top: 20px;
            padding: 16px;
            background: #F6FFED;
            border-radius: 8px;
            border: 1px solid #B7EB8F;
        }

        .answer-section label {
            display: block;
            font-size: 14px;
            color: #52C41A;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .analysis-section {
            margin-top: 20px;
            padding: 16px;
            background: #F5F7FA;
            border-radius: 8px;
            border: 1px solid #E8E8E8;
        }

        .analysis-section label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* 操作按钮 */
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #F0F0F0;
        }

        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-secondary {
            padding: 12px 24px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }

        .btn-secondary:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        /* 填空题样式 */
        .fill-blank {
            display: inline-block;
            width: 120px;
            height: 28px;
            border-bottom: 2px solid #1890FF;
            margin: 0 4px;
            vertical-align: middle;
        }

        /* 简答题样式 */
        .essay-answer {
            min-height: 120px;
            padding: 16px;
            border: 1px solid #E8E8E8;
            border-radius: 8px;
            background: #F9F9F9;
        }
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>
    
    <!-- 主内容区 -->
    <div class="main-content">
        <div class="header">
            <div class="breadcrumb">
                <span onclick="goBack()">普通题库</span> / 查看题目
            </div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>

        <div class="content-body">
            <button class="btn-back" onclick="goBack()">
                ← 返回列表
            </button>

            <!-- 基本信息 -->
            <div class="form-card">
                <div class="form-card-title">基本信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">题目名称</label>
                        <div class="form-value" id="questionName">计算机的CPU主要由哪两部分组成？</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">所属课程</label>
                        <div class="form-value" id="questionCourse">计算机基础</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">题型</label>
                        <div class="form-value" id="questionType">单选题</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">难度</label>
                        <div class="form-value" id="questionDifficulty">简单</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">是否公用</label>
                        <div class="form-value" id="questionIsPublic">
                            <span style="display: inline-block; padding: 4px 12px; background: #E6F7FF; color: #1890FF; border-radius: 4px; font-size: 12px;">否</span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">更新人</label>
                        <div class="form-value" id="questionUpdater">张老师</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">更新时间</label>
                        <div class="form-value" id="questionUpdateTime">2025-01-10</div>
                    </div>
                </div>
            </div>

            <!-- 题目内容 -->
            <div class="form-card">
                <div class="form-card-title">题目内容</div>
                <div class="form-group">
                    <label class="form-label">题干</label>
                    <div class="form-value" id="questionContent" style="line-height: 1.6; min-height: 80px;">计算机的CPU主要由哪两部分组成？</div>
                </div>

                <!-- 选项区域（单选/多选） -->
                <div class="options-section" id="optionsSection">
                    <label class="form-label">选项设置</label>
                    <div class="option-item">
                        <div class="option-label">A</div>
                        <div class="option-content">控制器和运算器</div>
                    </div>
                    <div class="option-item">
                        <div class="option-label">B</div>
                        <div class="option-content">运算器和内存</div>
                    </div>
                    <div class="option-item">
                        <div class="option-label">C</div>
                        <div class="option-content">控制器和内存</div>
                    </div>
                    <div class="option-item">
                        <div class="option-label">D</div>
                        <div class="option-content">运算器和硬盘</div>
                    </div>
                </div>

                <!-- 正确答案 -->
                <div class="answer-section">
                    <label>正确答案</label>
                    <div class="form-value" id="answerContent">A</div>
                </div>

                <!-- 答案解析 -->
                <div class="analysis-section">
                    <label>答案解析</label>
                    <div class="form-value" id="analysisContent" style="line-height: 1.5;">
                        CPU是计算机的核心部件，主要由控制器和运算器组成。控制器负责控制计算机各部件的工作，运算器负责进行算术和逻辑运算。
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="btn-group">
                    <button class="btn-secondary" onclick="goBack()">取消</button>
                    <button class="btn-primary" onclick="editQuestion()">编辑题目</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 题目数据
        const questionData = [
            { id: 1, name: '计算机的CPU主要由哪两部分组成？', content: '计算机的CPU主要由哪两部分组成？', major: '计算机类', course: '计算机基础', type: 'single', difficulty: 'easy', useCount: 15, createTime: '2025-01-10', updateTime: '2025-01-10', creator: '张老师', updater: '张老师', isPublic: false, options: ['控制器和运算器', '运算器和内存', '控制器和内存', '运算器和硬盘'], answer: 'A', analysis: 'CPU是计算机的核心部件，主要由控制器和运算器组成。控制器负责控制计算机各部件的工作，运算器负责进行算术和逻辑运算。' },
            { id: 2, name: '计算机内存断电后数据不会丢失。', content: '计算机内存断电后数据不会丢失。', major: '计算机类', course: '计算机基础', type: 'judge', difficulty: 'easy', useCount: 20, createTime: '2025-01-08', updateTime: '2025-01-08', creator: '张老师', updater: '张老师', isPublic: false, answer: '错误', analysis: '计算机内存（RAM）是易失性存储，断电后数据会丢失。只有非易失性存储（如硬盘、SSD等）断电后数据才会保留。' },
            { id: 3, name: '计算机的五大组成部分', content: '计算机的五大组成部分包括输入设备、输出设备、存储器、______和______。', major: '计算机类', course: '计算机基础', type: 'fill', difficulty: 'medium', useCount: 8, createTime: '2025-01-07', updateTime: '2025-01-07', creator: '张老师', updater: '张老师', isPublic: false, answer: '控制器,运算器', analysis: '计算机的五大组成部分是：输入设备、输出设备、存储器、控制器和运算器。其中控制器和运算器合称为CPU。' },
            { id: 4, name: '存储器的读写速度', content: '以下哪种存储器的读写速度最快？', major: '计算机类', course: '计算机基础', type: 'single', difficulty: 'medium', useCount: 18, createTime: '2025-01-05', updateTime: '2025-01-05', creator: '张老师', updater: '张老师', isPublic: false, options: ['硬盘', '内存', '光盘', 'U盘'], answer: 'B', analysis: '内存（RAM）的读写速度最快，其次是固态硬盘（SSD），然后是机械硬盘，最慢的是光盘和U盘。' },
            { id: 5, name: '1KB等于多少字节', content: '在计算机中，1KB等于多少字节？', major: '计算机类', course: '计算机基础', type: 'single', difficulty: 'easy', useCount: 30, createTime: '2025-01-01', updateTime: '2025-01-01', creator: '张老师', updater: '张老师', isPublic: false, options: ['1000', '1024', '2048', '4096'], answer: 'B', analysis: '在计算机中，1KB等于1024字节，这是二进制计数法的结果。' }
        ];

        // 题型映射
        const typeMap = {
            'single': { label: '单选题' },
            'multiple': { label: '多选题' },
            'judge': { label: '判断题' },
            'fill': { label: '填空题' },
            'essay': { label: '简答题' }
        };

        // 难度映射
        const difficultyMap = {
            'easy': '简单',
            'medium': '中等',
            'hard': '困难'
        };

        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 初始化
        function init() {
            const questionId = getUrlParam('id');
            if (questionId) {
                loadQuestion(questionId);
            } else {
                // 默认加载第一个题目
                loadQuestion(1);
            }
        }

        // 加载题目
        function loadQuestion(id) {
            const question = questionData.find(item => item.id == id);
            if (question) {
                document.getElementById('questionName').textContent = question.name;
                document.getElementById('questionType').textContent = typeMap[question.type].label;
                document.getElementById('questionContent').textContent = question.content;
                document.getElementById('questionCourse').textContent = question.course;
                document.getElementById('questionDifficulty').textContent = difficultyMap[question.difficulty];
                document.getElementById('questionUpdater').textContent = question.updater || question.creator;
                document.getElementById('questionUpdateTime').textContent = question.updateTime || question.createTime;
                document.getElementById('answerContent').textContent = question.answer;
                document.getElementById('analysisContent').textContent = question.analysis;

                // 渲染是否公用
                const isPublicElement = document.getElementById('questionIsPublic');
                if (question.isPublic) {
                    isPublicElement.innerHTML = '<span style="display: inline-block; padding: 4px 12px; background: #F6FFED; color: #52C41A; border-radius: 4px; font-size: 12px;">是</span>';
                } else {
                    isPublicElement.innerHTML = '<span style="display: inline-block; padding: 4px 12px; background: #E6F7FF; color: #1890FF; border-radius: 4px; font-size: 12px;">否</span>';
                }

                // 渲染选项
                renderOptions(question);
            }
        }

        // 渲染选项
        function renderOptions(question) {
            const optionsSection = document.getElementById('optionsSection');
            if (question.type === 'single' || question.type === 'multiple') {
                if (question.options) {
                    optionsSection.innerHTML = `
                        <label class="form-label">选项设置</label>
                    ` + question.options.map((option, index) => {
                        const label = String.fromCharCode(65 + index); // A, B, C, D...
                        return `
                            <div class="option-item">
                                <div class="option-label">${label}</div>
                                <div class="option-content">${option}</div>
                            </div>
                        `;
                    }).join('');
                }
            } else if (question.type === 'judge') {
                optionsSection.innerHTML = `
                    <label class="form-label">选项设置</label>
                    <div class="option-item">
                        <div class="option-label">√</div>
                        <div class="option-content">正确</div>
                    </div>
                    <div class="option-item">
                        <div class="option-label">×</div>
                        <div class="option-content">错误</div>
                    </div>
                `;
            } else if (question.type === 'fill') {
                // 填空题不需要选项
                optionsSection.innerHTML = '';
            } else if (question.type === 'essay') {
                // 简答题不需要选项
                optionsSection.innerHTML = '';
                // 修改答案显示样式
                const answerContent = document.getElementById('answerContent');
                answerContent.style.minHeight = '120px';
                answerContent.style.padding = '16px';
                answerContent.style.border = '1px solid #E8E8E8';
                answerContent.style.borderRadius = '8px';
                answerContent.style.background = '#F9F9F9';
            }
        }

        // 编辑题目
        function editQuestion() {
            const questionId = getUrlParam('id') || 1;
            window.location.href = `./教师端_题库_编辑题目.html?id=${questionId}`;
        }

        // 返回列表
        function goBack() {
            window.location.href = './教师端_题库.html';
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('iBodaoUser');
            window.location.href = './教学实训平台_登录.html';
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
</html>
