<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业管理 - 教务管理端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <link rel="stylesheet" href="./components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #F5F7FA;
            min-height: 100vh;
            display: flex;
        }

        /* 主内容区 */
        .main-content {
            margin-left: 220px;
            padding-top: 64px;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
            background: #F5F7FA;
            flex: 1;
            min-width: 0;
            box-sizing: border-box;
            display: block;
        }

        .content-wrapper {
            padding: 10px;
            width: 100%;
            display: block;
            flex: 1;
        }

        /* 页面标题 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 10px;
        }
        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            will-change: transform, box-shadow;
            transform: translateZ(0);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15);
        }
        .stat-card:hover .stat-icon {
            transform: scale(1.1) rotate(5deg);
        }
        .stat-card.total::before { background: linear-gradient(180deg, #6366f1 0%, #8b5cf6 100%); }
        .stat-card.active::before { background: linear-gradient(180deg, #10b981 0%, #34d399 100%); }
        .stat-card.warning::before { background: linear-gradient(180deg, #f59e0b 0%, #fbbf24 100%); }
        .stat-card.danger::before { background: linear-gradient(180deg, #ef4444 0%, #f87171 100%); }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.3s ease;
        }
        .stat-card.total .stat-icon { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: #fff; }
        .stat-card.active .stat-icon { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); color: #fff; }
        .stat-card.warning .stat-icon { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); color: #fff; }
        .stat-card.danger .stat-icon { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); color: #fff; }
        
        .stat-info { flex: 1; }
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        /* 筛选区域 */
        .filter-section {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .filter-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }
        .filter-toggle {
            margin-left: auto;
            padding: 0;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #6366f1;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s ease;
        }
        .filter-toggle:hover {
            color: #4f46e5;
            text-decoration: underline;
        }
        .filter-toggle .toggle-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 12px;
            height: 12px;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .filter-toggle.expanded .toggle-icon {
            transform: rotate(180deg);
        }
        .filter-row {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            flex-wrap: wrap;
            max-height: 70px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .filter-row.expanded {
            max-height: 400px;
        }
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 180px;
        }
        .filter-item label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
        }
        .filter-item input,
        .filter-item select {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            height: 36px;
            background: #fff;
            transition: all 0.2s ease;
        }
        .filter-item input:focus,
        .filter-item select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }

        /* 范围输入框样式 */
        .range-inputs {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .range-inputs input {
            flex: 1;
            min-width: 70px;
            padding: 8px 10px;
            height: 36px;
        }
        .range-separator {
            color: #94a3b8;
            font-weight: 500;
            font-size: 14px;
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(99,102,241,0.06);
            width: 100%;
            justify-content: flex-end;
        }

        /* 按钮样式 */
        .btn-primary {
            padding: 10px 20px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 14px rgba(99,102,241,0.4);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.5);
        }
        .btn-default {
            padding: 10px 20px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            transition: all 0.3s ease;
        }
        .btn-default:hover {
            border-color: #6366f1;
            color: #6366f1;
            background: rgba(99,102,241,0.04);
        }

        /* 操作栏 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 4px -1px rgba(0,0,0,0.05);
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .action-left {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-left button {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .record-count {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
        }
        .record-count span {
            color: #6366f1;
            font-weight: 600;
        }

        /* 表格容器 */
        .table-container {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-top: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 1000px;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: auto;
        }

        th {
            background: #f1f5f9;
            padding: 16px 20px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            border-bottom: 1px solid #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            position: relative;
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            transition: background-color 0.2s, border-color 0.2s;
            white-space: nowrap;
            background: #fff;
        }

        /* 固定第一列（复选框列） */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 10;
            width: 50px;
            min-width: 50px;
            max-width: 50px;
            text-align: center;
            vertical-align: middle;
        }

        th:first-child {
            background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
            z-index: 20;
        }

        td:first-child {
            background: #fff;
        }

        tr:hover td:first-child {
            background: rgba(99, 102, 241, 0.03);
        }

        /* 固定最后一列（操作列） */
        th:last-child,
        td:last-child {
            position: sticky;
            right: 0;
            z-index: 10;
            width: auto;
            min-width: fit-content;
        }

        th:last-child {
            background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
            z-index: 20;
        }

        td:last-child {
            background: #fff;
            padding: 16px 10px;
        }

        tr:hover td:last-child {
            background: rgba(99, 102, 241, 0.03);
        }

        /* 固定列阴影效果 */
        th:first-child::after,
        td:first-child::after {
            content: '';
            position: absolute;
            top: 0;
            right: -5px;
            bottom: 0;
            width: 5px;
            background: linear-gradient(90deg, rgba(0,0,0,0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        th:last-child::before,
        td:last-child::before {
            content: '';
            position: absolute;
            top: 0;
            left: -5px;
            bottom: 0;
            width: 5px;
            background: linear-gradient(270deg, rgba(0,0,0,0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        tr:hover td {
            background: rgba(99, 102, 241, 0.03);
        }

        /* 操作按钮 */
        .action-btns {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
        }

        .action-btns button {
            padding: 0;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #6366f1;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .action-btns button:hover {
            text-decoration: underline;
            color: #4f46e5;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .major-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 1024px) {
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            .content-wrapper {
                padding: 16px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .major-grid {
                grid-template-columns: 1fr;
            }
            .filter-row {
                flex-direction: column;
            }
            .filter-item {
                width: 100%;
            }
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 16px 0;
        }

        .pagination button {
            padding: 6px 12px;
            border: 1px solid #e2e8f0;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #64748b;
            transition: all 0.2s ease;
            min-width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pagination button:hover:not(:disabled) {
            border-color: #6366f1;
            color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
        }

        .pagination button.active {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #fff;
            border-color: #6366f1;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .pagination button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            background: #f1f5f9;
        }

        .pagination .page-info {
            font-size: 14px;
            color: #64748b;
            margin-right: 16px;
        }

        .pagination .page-size-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 16px;
        }

        .pagination .page-size-selector span {
            font-size: 14px;
            color: #64748b;
        }

        .pagination .page-size-selector select {
            padding: 4px 8px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 侧边栏导航容器 -->
    <div id="nav-container"></div>

    <!-- 顶部导航 -->
    <div class="header">
        <div class="header-left">
            <nav class="breadcrumb">
                <a href="./教学实训平台_教务管理端.html">教务管理</a>
                <span class="breadcrumb-separator">/</span>
                <span>专业管理</span>
            </nav>
        </div>
        <div class="header-right">
            <div id="user-menu-container"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="content-wrapper">
            <!-- 页面标题 -->
            <div class="page-header">
                <h1 class="page-title">专业管理</h1>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card total">
                    <div class="stat-icon">
                        <span class="iconfont icon-zhuanyeguanli"></span>
                    </div>
                    <div class="stat-info">
                        <div class="stat-number" id="totalCount">12</div>
                        <div class="stat-label">专业总数</div>
                    </div>
                </div>
                <div class="stat-card active">
                    <div class="stat-icon">
                        <span class="iconfont icon-zaizhao"></span>
                    </div>
                    <div class="stat-info">
                        <div class="stat-number" id="activeCount">10</div>
                        <div class="stat-label">在招专业</div>
                    </div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-icon">
                        <span class="iconfont icon-zanting"></span>
                    </div>
                    <div class="stat-info">
                        <div class="stat-number" id="suspensionCount">1</div>
                        <div class="stat-label">暂停招生</div>
                    </div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-icon">
                        <span class="iconfont icon-tingzhao"></span>
                    </div>
                    <div class="stat-info">
                        <div class="stat-number" id="stopCount">1</div>
                        <div class="stat-label">停止招生</div>
                    </div>
                </div>
            </div>

            <!-- 筛选区域 -->
            <div class="filter-section">
                <div class="filter-header">
                    <span class="filter-title">筛选条件</span>
                    <button class="filter-toggle" id="filterToggle" onclick="toggleFilter(this)">
                        <span class="toggle-text">展开</span>
                        <span class="toggle-icon">
                            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                    </button>
                </div>
                <div class="filter-row" id="filterRow">
                    <div class="filter-item">
                        <label>专业名称</label>
                        <input type="text" placeholder="请输入专业名称" id="filterName">
                    </div>
                    <div class="filter-item">
                        <label>专业代码</label>
                        <input type="text" placeholder="请输入专业代码" id="filterCode">
                    </div>
                    <div class="filter-item">
                        <label>班级数</label>
                        <div class="range-inputs">
                            <input type="number" placeholder="最小值" id="filterClassesMin" min="0">
                            <span class="range-separator">-</span>
                            <input type="number" placeholder="最大值" id="filterClassesMax" min="0">
                        </div>
                    </div>
                    <div class="filter-item">
                        <label>学生数</label>
                        <div class="range-inputs">
                            <input type="number" placeholder="最小值" id="filterStudentsMin" min="0">
                            <span class="range-separator">-</span>
                            <input type="number" placeholder="最大值" id="filterStudentsMax" min="0">
                        </div>
                    </div>
                    <div class="filter-item">
                        <label>课程数</label>
                        <div class="range-inputs">
                            <input type="number" placeholder="最小值" id="filterCoursesMin" min="0">
                            <span class="range-separator">-</span>
                            <input type="number" placeholder="最大值" id="filterCoursesMax" min="0">
                        </div>
                    </div>
                    <div class="filter-actions">
                        <button class="btn-default" onclick="resetFilter()">重置</button>
                        <button class="btn-primary" onclick="searchMajors()">查询</button>
                    </div>
                </div>
            </div>

            <!-- 操作栏 -->
            <div class="action-bar">
                <div class="action-left">
                    <button class="btn-primary" onclick="openAddModal()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        新增专业
                    </button>
                    <button class="btn-default" onclick="downloadImportTemplate()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        导入模板
                    </button>
                    <button class="btn-default" onclick="batchImport()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        批量导入
                    </button>
                    <button class="btn-default" onclick="batchExport()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        批量导出
                    </button>
                </div>
                <div class="record-count">
                    共 <span id="totalCount">0</span> 条记录
                </div>
            </div>

            <!-- 表格 -->
            <div class="table-container" role="region" aria-label="专业列表" tabindex="0">
                <table role="table" aria-describedby="tableSummary">
                    <caption class="sr-only" id="tableSummary">专业信息列表，包含专业名称、专业代码、所属院系、学生数、班级数、课程数等信息</caption>
                    <thead>
                        <tr>
                            <th scope="col">
                                <input type="checkbox" id="selectAll" onclick="toggleSelectAll()" aria-label="全选/取消全选">
                            </th>
                            <th scope="col">专业名称</th>
                            <th scope="col">专业代码</th>
                            <th scope="col">班级数</th>
                            <th scope="col">学生数</th>
                            <th scope="col">课程数</th>
                            <th scope="col">操作</th>
                        </tr>
                    </thead>
                    <tbody id="majorTable" role="rowgroup">
                        <!-- 数据由JavaScript动态生成 -->
                    </tbody>
                </table>

                <!-- 分页 -->
                <div class="pagination" id="pagination">
                    <!-- 分页由JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script src="./nav-loader-new.js"></script>
    <script src="./components.js"></script>
    <script>
        // 筛选展开/收起
        function toggleFilter(btn) {
            const filterRow = document.getElementById('filterRow');
            const toggleText = btn.querySelector('.toggle-text');
            const toggleIcon = btn.querySelector('.toggle-icon');
            const isExpanded = filterRow.classList.contains('expanded');

            if (isExpanded) {
                toggleText.textContent = '展开';
                btn.classList.remove('expanded');
                filterRow.classList.remove('expanded');
                toggleIcon.style.transform = 'rotate(0deg)';
            } else {
                toggleText.textContent = '收起';
                btn.classList.add('expanded');
                filterRow.classList.add('expanded');
                toggleIcon.style.transform = 'rotate(180deg)';
            }
        }

        // 分页相关变量
        let allMajors = [];
        let currentPage = 1;
        let pageSize = 10;

        // 生成专业数据
        function generateMajors() {
            const majorTemplates = [
                { name: '机械工程', codePrefix: 'ME', department: '机械工程学院', icon: 'blue', iconClass: 'icon-zhuanyeguanli' },
                { name: '数控技术', codePrefix: 'NC', department: '机械工程学院', icon: 'green', iconClass: 'icon-shukong' },
                { name: '模具设计与制造', codePrefix: 'MD', department: '机械工程学院', icon: 'orange', iconClass: 'icon-moju' },
                { name: '工业机器人技术', codePrefix: 'RI', department: '电气工程学院', icon: 'purple', iconClass: 'icon-robot' },
                { name: '机电一体化技术', codePrefix: 'EM', department: '电气工程学院', icon: 'cyan', iconClass: 'icon-jiadian' },
                { name: '电气自动化技术', codePrefix: 'EA', department: '电气工程学院', icon: 'pink', iconClass: 'icon-dianqi' },
                { name: '汽车检测与维修', codePrefix: 'AM', department: '汽车工程学院', icon: 'blue', iconClass: 'icon-qiche' },
                { name: '新能源汽车技术', codePrefix: 'NE', department: '汽车工程学院', icon: 'green', iconClass: 'icon-xinnengyuan' },
                { name: '计算机应用技术', codePrefix: 'CA', department: '信息工程学院', icon: 'purple', iconClass: 'icon-jisuanji' },
                { name: '软件技术', codePrefix: 'ST', department: '信息工程学院', icon: 'cyan', iconClass: 'icon-ruanjian' },
                { name: '物联网应用技术', codePrefix: 'IoT', department: '信息工程学院', icon: 'orange', iconClass: 'icon-wulianwang' },
                { name: '电子商务', codePrefix: 'EC', department: '经济管理学院', icon: 'pink', iconClass: 'icon-dianshang' }
            ];

            const majors = [];
            for (let i = 0; i < 36; i++) {
                const template = majorTemplates[i % majorTemplates.length];
                const index = Math.floor(i / majorTemplates.length) + 1;
                majors.push({
                    id: i + 1,
                    name: template.name + (index > 1 ? index : ''),
                    code: template.codePrefix + String(index).padStart(3, '0'),
                    department: template.department,
                    students: Math.floor(Math.random() * 300) + 100,
                    classes: Math.floor(Math.random() * 8) + 2,
                    courses: Math.floor(Math.random() * 15) + 15,
                    icon: template.icon,
                    iconClass: template.iconClass
                });
            }
            return majors;
        }

        // 渲染专业表格
        function renderMajors() {
            const tbody = document.getElementById('majorTable');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageMajors = allMajors.slice(start, end);

            if (pageMajors.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: #94a3b8;">
                            <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                            <div>暂无数据</div>
                        </td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = pageMajors.map((major) => `
                    <tr role="row" aria-label="专业 ${major.name} 的信息">
                        <td role="cell"><input type="checkbox" class="row-checkbox" value="${major.id}" aria-label="选择 ${major.name}"></td>
                        <td role="cell"><strong>${major.name}</strong></td>
                        <td role="cell">${major.code}</td>
                        <td role="cell">${major.classes}</td>
                        <td role="cell">${major.students}</td>
                        <td role="cell">${major.courses}</td>
                        <td role="cell">
                            <div class="action-btns">
                                <button onclick="viewMajor(${major.id})" aria-label="查看 ${major.name} 的详情">查看</button>
                                <button onclick="editMajor(${major.id})" aria-label="编辑 ${major.name} 的信息">编辑</button>
                                <button onclick="deleteMajor(${major.id})" aria-label="删除 ${major.name}">删除</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }
        }

        // 查询
        function searchMajors() {
            const filterName = document.getElementById('filterName').value.toLowerCase();
            const filterCode = document.getElementById('filterCode').value.toLowerCase();
            const filterClassesMin = parseInt(document.getElementById('filterClassesMin').value) || 0;
            const filterClassesMax = parseInt(document.getElementById('filterClassesMax').value) || Infinity;
            const filterStudentsMin = parseInt(document.getElementById('filterStudentsMin').value) || 0;
            const filterStudentsMax = parseInt(document.getElementById('filterStudentsMax').value) || Infinity;
            const filterCoursesMin = parseInt(document.getElementById('filterCoursesMin').value) || 0;
            const filterCoursesMax = parseInt(document.getElementById('filterCoursesMax').value) || Infinity;

            const filteredMajors = allMajors.filter(major => {
                const matchName = !filterName || major.name.toLowerCase().includes(filterName);
                const matchCode = !filterCode || major.code.toLowerCase().includes(filterCode);
                const matchClasses = major.classes >= filterClassesMin && major.classes <= filterClassesMax;
                const matchStudents = major.students >= filterStudentsMin && major.students <= filterStudentsMax;
                const matchCourses = major.courses >= filterCoursesMin && major.courses <= filterCoursesMax;
                return matchName && matchCode && matchClasses && matchStudents && matchCourses;
            });

            // 更新总页数并重新渲染
            const totalPages = Math.ceil(filteredMajors.length / pageSize) || 1;
            if (currentPage > totalPages) {
                currentPage = totalPages;
            }
            renderFilteredMajors(filteredMajors);
        }

        // 渲染筛选后的数据
        function renderFilteredMajors(filteredMajors) {
            const tbody = document.getElementById('majorTable');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageMajors = filteredMajors.slice(start, end);

            if (pageMajors.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: #94a3b8;">
                            <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                            <div>暂无符合条件的数据</div>
                        </td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = pageMajors.map((major) => `
                    <tr role="row" aria-label="专业 ${major.name} 的信息">
                        <td role="cell"><input type="checkbox" class="row-checkbox" value="${major.id}" aria-label="选择 ${major.name}"></td>
                        <td role="cell"><strong>${major.name}</strong></td>
                        <td role="cell">${major.code}</td>
                        <td role="cell">${major.classes}</td>
                        <td role="cell">${major.students}</td>
                        <td role="cell">${major.courses}</td>
                        <td role="cell">
                            <div class="action-btns">
                                <button onclick="viewMajor(${major.id})" aria-label="查看 ${major.name} 的详情">查看</button>
                                <button onclick="editMajor(${major.id})" aria-label="编辑 ${major.name} 的信息">编辑</button>
                                <button onclick="deleteMajor(${major.id})" aria-label="删除 ${major.name}">删除</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }

            // 更新分页信息
            document.getElementById('pageInfo').textContent = `第 ${currentPage} 页，共 ${Math.ceil(filteredMajors.length / pageSize) || 1} 页，共 ${filteredMajors.length} 条`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage >= Math.ceil(filteredMajors.length / pageSize);
        }

        // 重置筛选
        function resetFilter() {
            document.getElementById('filterName').value = '';
            document.getElementById('filterCode').value = '';
            document.getElementById('filterClassesMin').value = '';
            document.getElementById('filterClassesMax').value = '';
            document.getElementById('filterStudentsMin').value = '';
            document.getElementById('filterStudentsMax').value = '';
            document.getElementById('filterCoursesMin').value = '';
            document.getElementById('filterCoursesMax').value = '';
            currentPage = 1;
            renderMajors();
        }

        // 查看专业
        function viewMajor(index) {
            console.log('查看专业', index);
        }

        // 编辑专业
        function editMajor(index) {
            console.log('编辑专业', index);
        }

        // 管理课程
        function manageCourses(index) {
            console.log('管理课程', index);
        }

        // 打开新增弹窗
        function openAddModal() {
            console.log('打开新增弹窗');
        }

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(allMajors.length / pageSize);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1 && allMajors.length === 0) {
                pagination.innerHTML = '';
                return;
            }

            let html = `<div class="page-info">共 ${allMajors.length} 条</div>`;

            // 每页显示条数选择器
            html += `<div class="page-size-selector">
                <span>每页</span>
                <select onchange="changePageSize(this.value)">
                    <option value="10" ${pageSize === 10 ? 'selected' : ''}>10</option>
                    <option value="20" ${pageSize === 20 ? 'selected' : ''}>20</option>
                    <option value="50" ${pageSize === 50 ? 'selected' : ''}>50</option>
                </select>
                <span>条</span>
            </div>`;

            // 上一页按钮
            html += `<button onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} title="上一页">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>`;

            // 页码按钮
            const pageNumbers = getPageNumbers(currentPage, totalPages);
            pageNumbers.forEach(page => {
                if (page === '...') {
                    html += `<span style="padding: 0 8px; color: #94a3b8;">...</span>`;
                } else {
                    html += `<button class="${page === currentPage ? 'active' : ''}" onclick="goPage(${page})">${page}</button>`;
                }
            });

            // 下一页按钮
            html += `<button onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} title="下一页">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>`;

            // 页码跳转
            html += `<div style="display: flex; align-items: center; gap: 8px; margin-left: 16px;">
                <span style="font-size: 14px; color: #64748b;">跳至</span>
                <input type="number" id="jumpPageInput" min="1" max="${totalPages}" value=""
                    style="width: 50px; padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; font-size: 14px;"
                    onkeypress="if(event.key==='Enter'){jumpToPage(this.value, ${totalPages})}">
                <span style="font-size: 14px; color: #64748b;">页</span>
            </div>`;

            pagination.innerHTML = html;
        }

        // 获取页码显示数组
        function getPageNumbers(current, total) {
            const pages = [];
            if (total <= 7) {
                for (let i = 1; i <= total; i++) {
                    pages.push(i);
                }
            } else {
                if (current <= 3) {
                    for (let i = 1; i <= 5; i++) {
                        pages.push(i);
                    }
                    pages.push('...');
                    pages.push(total);
                } else if (current >= total - 2) {
                    pages.push(1);
                    pages.push('...');
                    for (let i = total - 4; i <= total; i++) {
                        pages.push(i);
                    }
                } else {
                    pages.push(1);
                    pages.push('...');
                    for (let i = current - 1; i <= current + 1; i++) {
                        pages.push(i);
                    }
                    pages.push('...');
                    pages.push(total);
                }
            }
            return pages;
        }

        // 跳转到指定页
        function goPage(page) {
            const totalPages = Math.ceil(allMajors.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderMajors();
            renderPagination();
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            rowCheckboxes.forEach(checkbox => {
                checkbox.checked = selectAllCheckbox.checked;
            });
        }

        // 改变每页条数
        function changePageSize(size) {
            pageSize = parseInt(size);
            currentPage = 1;
            renderMajors();
            renderPagination();
        }

        // 跳转到指定页（输入框）
        function jumpToPage(page, totalPages) {
            page = parseInt(page);
            if (isNaN(page) || page < 1 || page > totalPages) {
                alert('请输入有效的页码');
                return;
            }
            goPage(page);
        }

        // 删除专业
        function deleteMajor(id) {
            if (confirm('确定要删除这个专业吗？')) {
                allMajors = allMajors.filter(m => m.id !== id);
                const totalPages = Math.ceil(allMajors.length / pageSize);
                if (currentPage > totalPages && totalPages > 0) {
                    currentPage = totalPages;
                }
                renderMajors();
                renderPagination();
            }
        }

        // 下载导入模板
        function downloadImportTemplate() {
            const headers = ['专业名称', '专业代码', '班级数', '学生数', '课程数'];
            const templateContent = headers.join(',') + '\n' +
                '示例专业,EX001,5,150,20\n';
            
            const blob = new Blob(['\ufeff' + templateContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '专业导入模板.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            showMessage('导入模板已下载', 'success');
        }

        // 批量导入
        function batchImport() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv,.xlsx,.xls';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const content = event.target.result;
                        const lines = content.split('\n').filter(line => line.trim());
                        const headers = lines[0].split(',').map(h => h.trim());
                        
                        let successCount = 0;
                        let errorCount = 0;
                        
                        for (let i = 1; i < lines.length; i++) {
                            const values = lines[i].split(',').map(v => v.trim());
                            if (values.length >= 5) {
                                try {
                                    const newMajor = {
                                        id: allMajors.length + i,
                                        name: values[0],
                                        code: values[1],
                                        classes: parseInt(values[2]) || 0,
                                        students: parseInt(values[3]) || 0,
                                        courses: parseInt(values[4]) || 0,
                                        department: '未分配'
                                    };
                                    allMajors.push(newMajor);
                                    successCount++;
                                } catch (err) {
                                    errorCount++;
                                }
                            }
                        }
                        
                        renderMajors();
                        renderPagination();
                        showMessage(`成功导入 ${successCount} 条专业数据${errorCount > 0 ? `，${errorCount} 条失败` : ''}`, 'success');
                    } catch (error) {
                        showMessage('导入失败: ' + error.message, 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // 批量导出
        function batchExport() {
            if (allMajors.length === 0) {
                showMessage('没有可导出的数据', 'info');
                return;
            }
            
            try {
                const headers = ['专业名称', '专业代码', '班级数', '学生数', '课程数'];
                const rows = allMajors.map(major => [
                    major.name,
                    major.code,
                    major.classes,
                    major.students,
                    major.courses
                ].join(','));
                
                const csvContent = '\ufeff' + headers.join(',') + '\n' + rows.join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `专业数据_${new Date().toISOString().slice(0, 10)}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
                showMessage(`成功导出 ${allMajors.length} 条专业数据`, 'success');
            } catch (error) {
                showMessage('导出失败: ' + error.message, 'error');
            }
        }

        // 显示消息提示
        function showMessage(message, type = 'info') {
            const messageDiv = document.createElement('div');
            messageDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 500;
                z-index: 9999;
                animation: slideIn 0.3s ease;
                ${type === 'success' ? 'background: #10b981; color: white;' : 
                  type === 'error' ? 'background: #ef4444; color: white;' : 
                  'background: #6366f1; color: white;'}
            `;
            messageDiv.textContent = message;
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => document.body.removeChild(messageDiv), 300);
            }, 3000);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            allMajors = generateMajors();
            renderMajors();
            renderPagination();
        });
    </script>
    <script src="./user-menu-component.js"></script>
</body>
