<script>
// 获取URL参数
function getUrlParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

// 页面加载时设置标题
window.onload = function() {
    const examName = getUrlParam('examName');
    if (examName) {
        document.getElementById('examTitle').textContent = examName;
    }
    startTimer();
};

// 计时器
function startTimer() {
    let minutes = 30;
    let seconds = 0;
    
    const timer = setInterval(() => {
        if (seconds === 0) {
            if (minutes === 0) {
                clearInterval(timer);
                alert('考试时间到！');
                submitExam();
                return;
            }
            minutes--;
            seconds = 59;
        } else {
            seconds--;
        }
        
        const minStr = minutes.toString().padStart(2, '0');
        const secStr = seconds.toString().padStart(2, '0');
        document.getElementById('timer').textContent = minStr + ':' + secStr;
    }, 1000);
}

// 返回课程
function goBack() {
    if (confirm('确定要退出考试吗？退出后已作答的题目将保存，但计时不会暂停。')) {
        window.location.href = './course-detail.html';
    }
}

// 上一题
function prevQuestion() {
    alert('上一题');
}

// 下一题
function nextQuestion() {
    alert('下一题');
}

// 提交试卷
function submitExam() {
    if (confirm('确定要提交试卷吗？提交后将无法修改答案。')) {
        alert('试卷已提交！');
        window.location.href = './exam-result.html';
    }
}
</script>
