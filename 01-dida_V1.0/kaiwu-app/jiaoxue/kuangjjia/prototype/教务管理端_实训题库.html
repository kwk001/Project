    <style>
        /* 页面特定样式 - 题型标签 */
        .type-tag { 
            display: inline-flex; 
            align-items: center;
            padding: 3px 10px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 500;
            border: 1px solid transparent;
        }
        .type-process { background: #F6FFED; color: #52C41A; border-color: #B7EB8F; }
        .type-programming { background: #FFF7E6; color: #FA8C16; border-color: #FFD591; }
        .type-design { background: #E6F7FF; color: #1890FF; border-color: #91D5FF; }
        .type-machining { background: #FFF2F0; color: #FF4D4F; border-color: #FFCCC7; }
        .type-inspection { background: #F9F0FF; color: #722ED1; border-color: #D3ADF7; }
        
        /* 难度标签 */
        .difficulty-tag { 
            display: inline-flex;
            align-items: center;
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 12px;
            font-weight: 500;
        }
        .difficulty-easy { background: #F6FFED; color: #52C41A; }
        .difficulty-medium { background: #FFF7E6; color: #FA8C16; }
        .difficulty-hard { background: #FFF1F0; color: #FF4D4F; }

        /* 统计卡片样式 */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            flex: 1;
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-card.success { border-left: 4px solid #52C41A; }
        .stat-card.primary { border-left: 4px solid #1890FF; }
        .stat-card.info { border-left: 4px solid #722ED1; }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .stat-card.success .stat-icon { background: #F6FFED; }
        .stat-card.primary .stat-icon { background: #E6F7FF; }
        .stat-card.info .stat-icon { background: #F9F0FF; }
        .stat-info h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
            font-weight: normal;
        }
        .stat-info .number {
            font-size: 28px;
            font-weight: 600;
            color: #333;
        }

        /* 内容区域边距 */
        .content-area {
            padding: 16px !important;
        }

        /* 统计卡片间距 */
        .stats-row {
            margin-bottom: 16px !important;
        }

        /* 筛选条件模块 */
        .filter-section {
            margin-bottom: 16px !important;
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(99,102,241,0.06);
        }

        /* 批量操作栏 */
        .batch-operation-bar {
            margin-bottom: 16px !important;
        }

        /* 表格区域 */
        .table-section {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(99,102,241,0.06);
            overflow: hidden;
        }
        .table-section .data-table {
            border-radius: 12px;
            box-shadow: none;
            border: none;
            overflow: hidden;
        }
        .table-section .pagination {
            border-top: 1px solid #F0F0F0;
            background: transparent;
            padding: 16px 0 0 0;
            margin-top: 16px;
        }

        /* 批量操作栏 */
        .batch-operation-bar {
            background: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(99,102,241,0.02) 100%);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .batch-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .batch-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #1e293b;
        }
        .batch-info {
            font-size: 13px;
            color: #64748b;
        }
        .batch-info strong {
            color: #6366f1;
            font-weight: 600;
        }
        .batch-right {
            display: flex;
            gap: 8px;
        }
        .btn-batch {
            padding: 6px 14px;
            border: 1px solid rgba(99,102,241,0.2);
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #64748b;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-batch:hover {
            border-color: #6366f1;
            color: #6366f1;
            background: rgba(99,102,241,0.04);
            transform: translateY(-1px);
        }
        .btn-batch.danger:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239,68,68,0.04);
        }

        /* 查看详情模态框 */
        .question-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .question-modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .question-modal-content {
            background: #fff;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .question-modal-header {
            padding: 24px 32px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: 16px 16px 0 0;
        }

        .question-modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            margin: 0;
        }

        .question-modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #64748b;
            transition: all 0.2s ease;
        }

        .question-modal-close:hover {
            background: rgba(0, 0, 0, 0.1);
            color: #1e293b;
            transform: rotate(90deg);
        }

        .question-modal-body {
            padding: 32px;
        }

        .question-info {
            margin-bottom: 32px;
        }

        .question-content {
            font-size: 16px;
            line-height: 1.6;
            color: #334155;
            margin-bottom: 24px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(99, 102, 241, 0.02) 100%);
            border-radius: 12px;
            border-left: 4px solid #6366f1;
        }

        .question-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .meta-label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-value {
            font-size: 14px;
            color: #1e293b;
            font-weight: 500;
        }

        .meta-value.tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .question-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
        }

        .btn-secondary {
            padding: 10px 24px;
            background: #fff;
            color: #64748b;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            border-color: #6366f1;
            color: #6366f1;
            background: rgba(99, 102, 241, 0.04);
        }

        .btn-primary {
            padding: 10px 24px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        /* 新增模块样式 */
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 16px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }

        .answer-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
        }

        .answer-content {
            font-size: 14px;
            line-height: 1.6;
            color: #475569;
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
            border-left: 3px solid #10b981;
        }

        /* 标签样式 */
        .tag.type-process {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #fff;
        }

        .tag.type-programming {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
        }

        .tag.type-design {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #fff;
        }

        .tag.type-machining {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: #fff;
        }

        .tag.type-inspection {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: #fff;
        }

        .tag.difficulty-easy {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #fff;
        }

        .tag.difficulty-medium {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #fff;
        }

        .tag.difficulty-hard {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: #fff;

            { id: 12, name: '注塑模具浇注系统', content: '注塑模具的浇注系统设计要点。', course: '注塑模具', type: 'design', typeName: '设计类', difficulty: 'hard', difficultyName: '困难', isPublic: '否', updater: '冯老师', updateTime: '2026-03-09 05:45:33', answer: '1. 主流道：锥度2-4°\n2. 分流道：圆形或梯形截面\n3. 浇口：位置选择在壁厚处\n4. 冷料井：收集冷料\n5. 排气系统：保证熔体填充' }
        ];

        // ==================== 筛选字段配置 ====================
        const filterFields = [
            { type: 'text', label: '题目名称', name: 'content', placeholder: '请输入题目名称' },
            { 
                type: 'select', 
                label: '题型', 
                name: 'type',
                options: [
                    { value: '', label: '全部题型' },
                    { value: 'process', label: '工艺类' },
                    { value: 'programming', label: '编程类' },
                    { value: 'design', label: '设计类' },
                    { value: 'machining', label: '加工类' },
                    { value: 'inspection', label: '检测类' }
                ]
            },
            { 
                type: 'select', 
                label: '难度', 
                name: 'difficulty',
                options: [
                    { value: '', label: '全部难度' },
                    { value: 'easy', label: '简单' },
                    { value: 'medium', label: '中等' },
                    { value: 'hard', label: '困难' }
                ]
            },
            { 
                type: 'select', 
                label: '时间范围', 
                name: 'time',
                options: [
                    { value: '', label: '全部时间' },
                    { value: 'today', label: '今天' },
                    { value: 'week', label: '本周' },
                    { value: 'month', label: '本月' }
                ]
            }
        ];

        // ==================== 表格列配置 ====================
        const columns = [
            { 
                title: '序号', 
                dataIndex: 'id', 
                width: 60,
                render: (val, row) => `<input type="checkbox" class="row-checkbox" value="${row.id}" onchange="updateSelectedCount()"> ${val}`
            },
            {
                title: '题目名称',
                dataIndex: 'content',
                width: 350,
                render: (val) => `<span style="color: #1e293b; font-weight: 500;">${val}</span>`
            },
            { title: '所属课程', dataIndex: 'course', width: 120 },
            {
                title: '题型',
                dataIndex: 'typeName',
                width: 100,
                render: (val, row) => {
                    const typeClass = {
                        '工艺类': 'type-process',
                        '编程类': 'type-programming',
                        '设计类': 'type-design',
                        '加工类': 'type-machining',
                        '检测类': 'type-inspection'
                    }[val] || 'type-process';
                    return `<span class="type-tag ${typeClass}">${val}</span>`;
                }
            },
            {
                title: '难度',
                dataIndex: 'difficultyName',
                width: 80,
                render: (val) => {
                    const diffClass = {
                        '简单': 'difficulty-easy',
                        '中等': 'difficulty-medium',
                        '困难': 'difficulty-hard'
                    }[val] || 'difficulty-easy';
                    return `<span class="difficulty-tag ${diffClass}">${val}</span>`;
                }
            },
            { title: '更新人', dataIndex: 'updater', width: 100 },
            { title: '更新时间', dataIndex: 'updateTime', width: 150 },
            {
                title: '操作',
                width: 100,
                render: (val, row) => {
                    return `<div class="action-btns">
                        <button onclick="viewQuestion(${row.id})"><i class="iconfont icon-chakan"></i> 查看</button>
                    </div>`;
                }
            }
        ];

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化筛选组件
            FilterSection.init({
                containerId: 'filterRow',
                fields: filterFields,
                onSearch: (values) => {
                    console.log('筛选条件:', values);
                    filterQuestions(values);
                },
                onReset: () => {
                    DataTable.setData(questionData);
                }
            });

            // 初始化表格
            DataTable.init({
                containerId: 'dataTable',
                columns: columns,
                data: questionData,
                fixedFirstColumn: true,
                fixedLastColumn: true
            });

            // 初始化分页
            Pagination.init({
                containerId: 'pagination',
                total: questionData.length,
                pageSize: 10,
                current: 1,
                onChange: (page) => {
                    console.log('切换到第', page, '页');
                }
            });
        });

        // ==================== 筛选功能 ====================
        function filterQuestions(values) {
            let filtered = questionData;
            
            if (values.content) {
                filtered = filtered.filter(item => item.content.includes(values.content));
            }
            if (values.type) {
                filtered = filtered.filter(item => item.type === values.type);
            }
            if (values.difficulty) {
                filtered = filtered.filter(item => item.difficulty === values.difficulty);
            }
            if (values.time) {
                const now = new Date();
                filtered = filtered.filter(item => {
                    const itemDate = new Date(item.updateTime);
                    switch(values.time) {
                        case 'today':
                            return itemDate.toDateString() === now.toDateString();
                        case 'week':
                            const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
                            return itemDate >= weekAgo;
                        case 'month':
                            const monthAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);
                            return itemDate >= monthAgo;
                        default:
                            return true;
                    }
                });
            }
            
            DataTable.setData(filtered);
            Pagination.updateTotal(filtered.length);
        }

        // ==================== 批量操作 ====================
        let selectedItems = [];

        function toggleSelectAll() {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            const selectAllCheckbox = document.getElementById('selectAll');
            checkboxes.forEach(cb => {
                cb.checked = selectAllCheckbox.checked;
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const checkboxes = document.querySelectorAll('.row-checkbox:checked');
            selectedItems = Array.from(checkboxes).map(cb => cb.value);
            document.getElementById('selectedCount').textContent = selectedItems.length;
            
            const batchBar = document.querySelector('.batch-operation-bar');
            if (selectedItems.length > 0) {
                batchBar.style.display = 'flex';
            } else {
                batchBar.style.display = 'none';
            }
        }

        function batchExport() {
            if (selectedItems.length === 0) {
                alert('请先选择要导出的题目');
                return;
            }
            alert(`导出 ${selectedItems.length} 道题目`);
        }

        function batchDelete() {
            if (selectedItems.length === 0) {
                alert('请先选择要删除的题目');
                return;
            }
            if (confirm(`确定要删除选中的 ${selectedItems.length} 道题目吗？`)) {
                alert('删除成功');
                selectedItems = [];
                document.querySelector('.batch-operation-bar').style.display = 'none';
                DataTable.setData(questionData);
            }
        }

        // ==================== 题目操作 ====================
        function viewQuestion(id) {
            const question = questionData.find(q => q.id === id);
            if (question) {
                // 设置模态框内容
                document.getElementById('modalQuestionName').textContent = question.name;
                document.getElementById('modalCourse').textContent = question.course;
                
                // 设置题型标签
                const typeElement = document.getElementById('modalType');
                typeElement.textContent = question.typeName;
                typeElement.className = 'meta-value tag';
                const typeClass = {
                    '工艺类': 'type-process',
                    '编程类': 'type-programming',
                    '设计类': 'type-design',
                    '加工类': 'type-machining',
                    '检测类': 'type-inspection'
                }[question.typeName] || 'type-process';
                typeElement.classList.add(typeClass);
                
                // 设置难度标签
                const difficultyElement = document.getElementById('modalDifficulty');
                difficultyElement.textContent = question.difficultyName;
                difficultyElement.className = 'meta-value tag';
                const diffClass = {
                    '简单': 'difficulty-easy',
                    '中等': 'difficulty-medium',
                    '困难': 'difficulty-hard'
                }[question.difficultyName] || 'difficulty-easy';
                difficultyElement.classList.add(diffClass);
                
                document.getElementById('modalIsPublic').textContent = question.isPublic;
                document.getElementById('modalUpdater').textContent = question.updater;
                document.getElementById('modalUpdateTime').textContent = question.updateTime;
                document.getElementById('modalQuestionContent').textContent = question.content;
                document.getElementById('modalAnswer').textContent = question.answer;
                
                // 显示模态框
                document.getElementById('questionModal').classList.add('active');
            }
        }

        function closeQuestionModal() {
            document.getElementById('questionModal').classList.remove('active');
        }

        function editQuestion() {
            alert('编辑题目功能开发中...');
        }
    </script>
</body>
</html>
