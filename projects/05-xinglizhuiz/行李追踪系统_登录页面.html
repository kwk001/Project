<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行李全程追踪系统 - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 背景动画效果 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(37, 99, 235, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* 浮动粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(37, 99, 235, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 1s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 2.5s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 4.5s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* 登录容器 */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(37, 99, 235, 0.1);
            padding: 48px 40px;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #2563eb, #06b6d4, #8b5cf6);
        }

        /* Logo区域 */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(37, 99, 235, 0.6); }
        }

        .logo-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .system-name {
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 8px;
        }

        .system-subtitle {
            font-size: 14px;
            color: #94a3b8;
        }

        /* 登录表单 */
        .login-form {
            margin-top: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            color: #f8fafc;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: #64748b;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            transition: color 0.3s ease;
        }

        .form-input:focus + .input-icon {
            color: #2563eb;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #f8fafc;
        }

        /* 选项区域 */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2563eb;
            cursor: pointer;
        }

        .remember-me span {
            font-size: 14px;
            color: #94a3b8;
        }

        .forgot-password {
            font-size: 14px;
            color: #2563eb;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #3b82f6;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* 底部信息 */
        .login-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .version-info {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .copyright {
            font-size: 12px;
            color: #475569;
        }

        /* 错误提示 */
        .error-message {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            margin-bottom: 20px;
            color: #ef4444;
            font-size: 14px;
        }

        .error-message.show {
            display: flex;
        }

        /* 加载动画 */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }

            .system-name {
                font-size: 20px;
            }

            .logo-icon {
                width: 64px;
                height: 64px;
            }

            .logo-icon svg {
                width: 32px;
                height: 32px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-animation"></div>
    
    <!-- 浮动粒子 -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- 登录容器 -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo区域 -->
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                </div>
                <h1 class="system-name">行李全程追踪系统</h1>
                <p class="system-subtitle">Baggage Tracking System</p>
            </div>

            <!-- 错误提示 -->
            <div class="error-message" id="errorMessage">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span>用户名或密码错误，请重新输入</span>
            </div>

            <!-- 登录表单 -->
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-input" placeholder="请输入用户名" id="username">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" placeholder="请输入密码" id="password">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <svg class="password-toggle" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="togglePassword">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>记住我</span>
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>

                <button type="submit" class="login-btn">登 录</button>
            </form>

            <!-- 底部信息 -->
            <div class="login-footer">
                <div class="version-info">版本号：V1.0.0</div>
                <div class="copyright">© 2026 博睿英特 版权所有</div>
            </div>
        </div>
    </div>

    <script>
        // 密码显示/隐藏切换
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                `;
            } else {
                passwordInput.type = 'password';
                this.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                `;
            }
        });

        // 登录验证配置
        const LOGIN_CONFIG = {
            // 默认账号列表
            accounts: [
                { username: 'admin', password: 'admin123', name: '系统管理员', role: 'admin' },
                { username: 'operator', password: 'op123456', name: '操作员', role: 'operator' },
                { username: 'viewer', password: 'view123', name: '访客', role: 'viewer' }
            ],
            // 最大登录失败次数
            maxAttempts: 5,
            // 锁定时间（分钟）
            lockDuration: 30
        };

        // 登录状态管理
        const LoginManager = {
            // 获取登录失败次数
            getAttempts(username) {
                const attempts = localStorage.getItem(`login_attempts_${username}`);
                return attempts ? parseInt(attempts) : 0;
            },

            // 增加登录失败次数
            incrementAttempts(username) {
                const attempts = this.getAttempts(username) + 1;
                localStorage.setItem(`login_attempts_${username}`, attempts);
                return attempts;
            },

            // 清除登录失败次数
            clearAttempts(username) {
                localStorage.removeItem(`login_attempts_${username}`);
                localStorage.removeItem(`login_lock_${username}`);
            },

            // 检查账号是否被锁定
            isLocked(username) {
                const lockTime = localStorage.getItem(`login_lock_${username}`);
                if (!lockTime) return false;
                
                const lockDate = new Date(parseInt(lockTime));
                const now = new Date();
                const diffMinutes = (now - lockDate) / (1000 * 60);
                
                if (diffMinutes >= LOGIN_CONFIG.lockDuration) {
                    this.clearAttempts(username);
                    return false;
                }
                return true;
            },

            // 锁定账号
            lockAccount(username) {
                localStorage.setItem(`login_lock_${username}`, Date.now());
            },

            // 验证用户名密码
            validate(username, password) {
                const account = LOGIN_CONFIG.accounts.find(acc => acc.username === username);
                if (!account) return { success: false, message: '用户名或密码错误' };
                if (account.password !== password) return { success: false, message: '用户名或密码错误' };
                return { success: true, account };
            },

            // 保存登录状态
            saveLoginState(account, remember) {
                const loginData = {
                    username: account.username,
                    name: account.name,
                    role: account.role,
                    loginTime: new Date().toISOString()
                };
                
                if (remember) {
                    localStorage.setItem('user_info', JSON.stringify(loginData));
                } else {
                    sessionStorage.setItem('user_info', JSON.stringify(loginData));
                }
            },

            // 获取保存的用户名
            getSavedUsername() {
                return localStorage.getItem('saved_username') || '';
            },

            // 保存用户名
            saveUsername(username) {
                localStorage.setItem('saved_username', username);
            }
        };

        // 显示错误信息
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.querySelector('span').textContent = message;
            errorEl.classList.add('show');
        }

        // 隐藏错误信息
        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        // 显示加载状态
        function setLoading(loading) {
            const btn = document.querySelector('.login-btn');
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> 登录中...';
            } else {
                btn.disabled = false;
                btn.innerHTML = '登 录';
            }
        }

        // 页面加载时恢复保存的用户名
        document.addEventListener('DOMContentLoaded', function() {
            const savedUsername = LoginManager.getSavedUsername();
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('rememberMe').checked = true;
            }
        });

        // 表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // 基础验证
            if (!username) {
                showError('请输入用户名');
                document.getElementById('username').focus();
                return;
            }
            
            if (!password) {
                showError('请输入密码');
                document.getElementById('password').focus();
                return;
            }

            // 检查账号是否被锁定
            if (LoginManager.isLocked(username)) {
                showError(`账号已锁定，请${LOGIN_CONFIG.lockDuration}分钟后重试`);
                return;
            }

            setLoading(true);

            // 模拟网络延迟
            await new Promise(resolve => setTimeout(resolve, 800));

            // 验证登录
            const result = LoginManager.validate(username, password);

            if (result.success) {
                // 登录成功
                LoginManager.clearAttempts(username);
                LoginManager.saveLoginState(result.account, rememberMe);
                
                if (rememberMe) {
                    LoginManager.saveUsername(username);
                } else {
                    localStorage.removeItem('saved_username');
                }

                showError('登录成功！正在跳转...');
                document.getElementById('errorMessage').style.background = 'rgba(16, 185, 129, 0.15)';
                document.getElementById('errorMessage').style.borderColor = 'rgba(16, 185, 129, 0.3)';
                document.getElementById('errorMessage').style.color = '#10b981';
                
                // 跳转到首页
                setTimeout(() => {
                    window.location.href = './行李追踪系统_界面原型.html';
                }, 1000);
            } else {
                // 登录失败
                const attempts = LoginManager.incrementAttempts(username);
                const remainingAttempts = LOGIN_CONFIG.maxAttempts - attempts;
                
                if (attempts >= LOGIN_CONFIG.maxAttempts) {
                    LoginManager.lockAccount(username);
                    showError(`登录失败次数过多，账号已锁定${LOGIN_CONFIG.lockDuration}分钟`);
                } else {
                    showError(`${result.message}，还剩${remainingAttempts}次机会`);
                }
                
                setLoading(false);
            }
        });

        // 输入时隐藏错误信息
        document.getElementById('username').addEventListener('input', hideError);
        document.getElementById('password').addEventListener('input', hideError);

        // 忘记密码提示
        document.querySelector('.forgot-password').addEventListener('click', function(e) {
            e.preventDefault();
            alert('请联系系统管理员重置密码\n\n默认账号：\n- 管理员：admin / admin123\n- 操作员：operator / op123456\n- 访客：viewer / view123');
        });
    </script>
</body>
</html>
