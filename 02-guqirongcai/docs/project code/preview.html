<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开物低代码页面预览</title>
  <script src="https://cdn.kaiwu.cloud/cdn/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.kaiwu.cloud/cdn/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.kaiwu.cloud/cdn/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.kaiwu.cloud/cdn/npm/antd@5/dist/antd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.kaiwu.cloud/cdn/npm/antd@5/dist/reset.css">
  <script src="https://cdn.kaiwu.cloud/cdn/npm/dayjs/dayjs.min.js"></script>
  <script src="https://cdn.kaiwu.cloud/cdn/npm/dayjs/plugin/localeData.js"></script>
  <script src="https://cdn.kaiwu.cloud/cdn/npm/dayjs/locale/zh-cn.js"></script>
  <style>
    body { margin: 0; padding: 20px; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .preview-container { max-width: 1400px; margin: 0 auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 24px; }
    .page-selector { margin-bottom: 20px; padding: 16px; background: #f8f9fa; border-radius: 8px; }
    .page-selector select { padding: 8px 16px; font-size: 14px; border: 1px solid #d9d9d9; border-radius: 4px; margin-left: 8px; }
    .page-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #262626; }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="page-title">开物低代码页面预览</div>
    <div class="page-selector">
      <label>选择页面：</label>
      <select id="pageSelect">
        <option value="">-- 请选择 --</option>
        <option value="unit">计量单位管理</option>
        <option value="product">产品码打印</option>
        <option value="trace">微信扫码溯源</option>
      </select>
    </div>
    <div id="root"></div>
  </div>

  <script>
    // 模拟 KaiwuMesModule
    window.KaiwuMesModule = {
      injectMesModuleMethods: (component) => {
        component.prototype.setStatePromise = function(newState) {
          return new Promise((resolve) => {
            this.setState(newState, resolve);
          });
        };
      }
    };

    // 模拟 antd 主题
    window.antdTheme = { token: { colorPrimary: '#1890ff' } };

    // 模拟 DayjsLocale
    window.DayjsLocale = {
      getZhCN: () => ({
        locale: 'zh-cn',
        Pagination: { items_per_page: '条/页', jump_to: '跳至', page: '页' }
      })
    };

    // 挂载 antd 到 window
    window.antd = window.antd || {};
    Object.keys(antd).forEach(key => {
      window.antd[key] = antd[key];
    });

    // 页面配置
    const pageConfigs = {
      unit: {
        name: '计量单位管理',
        path: './基础数据/计量单位/index.jsx'
      },
      product: {
        name: '产品码打印',
        path: './基础数据/产品码打印/index.jsx'
      },
      trace: {
        name: '微信扫码溯源',
        path: './微信扫码溯源/index.jsx'
      }
    };

    // 加载页面
    document.getElementById('pageSelect').addEventListener('change', async (e) => {
      const pageKey = e.target.value;
      if (!pageKey) return;

      const config = pageConfigs[pageKey];
      try {
        const response = await fetch(config.path);
        const jsxCode = await response.text();

        // 显示代码预览（实际低代码需要引擎支持）
        document.getElementById('root').innerHTML = `
          <div style="padding: 20px; background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 4px;">
            <h3>📄 ${config.name}</h3>
            <p>文件路径：<code>${config.path}</code></p>
            <p>文件大小：${jsxCode.length} 字符</p>
            <hr style="margin: 16px 0; border: none; border-top: 1px solid #e8e8e8;">
            <p><strong>说明：</strong>开物低代码页面需要在开物引擎环境中运行。</p>
            <p>当前为文件预览模式，如需完整预览，请使用以下方式：</p>
            <ol style="line-height: 2;">
              <li>安装开物 CLI：<code>npm install -g @kaiwu/cli</code></li>
              <li>启动预览服务：<code>kaiwu preview</code></li>
              <li>或在 VSCode 中安装开物插件预览</li>
            </ol>
          </div>
          <details style="margin-top: 16px;">
            <summary style="cursor: pointer; color: #1890ff;">查看代码片段（前50行）</summary>
            <pre style="background: #f5f5f5; padding: 16px; border-radius: 4px; overflow-x: auto;"><code>${jsxCode.split('\n').slice(0, 50).join('\n')}</code></pre>
          </details>
        `;
      } catch (error) {
        document.getElementById('root').innerHTML = `
          <div style="padding: 20px; background: #fff2f0; border: 1px solid #ffccc7; border-radius: 4px; color: #f5222d;">
            加载失败：${error.message}
          </div>
        `;
      }
    });
  </script>
</body>
</html>
