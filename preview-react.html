<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品档案 - 开物低代码预览</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/antd@5.15.0/dist/reset.css">
    <link rel="stylesheet" href="https://unpkg.com/antd@5.15.0/dist/antd.min.css">
    <script src="https://unpkg.com/antd@5.15.0/dist/antd.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        #root {
            min-height: 100vh;
            padding: 24px;
        }
        .preview-badge {
            display: inline-block;
            background: linear-gradient(135deg, #1890ff 0%, #36cfc9 100%);
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 12px;
            font-weight: 500;
        }
        .change-note {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }
        .change-note h4 {
            margin: 0 0 12px 0;
            color: #096dd9;
            font-size: 14px;
        }
        .field-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
        }
        .field-removed {
            background: #ffccc7;
            color: #cf1322;
            text-decoration: line-through;
        }
        .field-added {
            background: #d9f7be;
            color: #389e0d;
            font-weight: 500;
        }
        .field-changed {
            background: #fff2e8;
            color: #d46b08;
        }
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const {
            Table, Button, Card, Space, Tag, Tooltip,
            Input, Select, Form, Row, Col, Badge,
            Pagination, Alert, Typography, Divider
        } = antd;
        const {
            PlusOutlined, ImportOutlined, ExportOutlined,
            EditOutlined, DeleteOutlined, EyeOutlined,
            ArrowUpOutlined, ArrowDownOutlined, SearchOutlined,
            ReloadOutlined
        } = icons;

        // 模拟商品数据
        const mockData = [
            {
                id: '1',
                goodsName: '大白菜',
                specification: '散装/每颗约2-3斤',
                measurementUnit: '斤',
                remark: '新鲜蔬菜，当日采购',
                createTime: '2024-01-15 10:30:00',
                status: '已上架'
            },
            {
                id: '2',
                goodsName: '西红柿',
                specification: '盒装/每盒500g',
                measurementUnit: '盒',
                remark: '有机种植，无农药残留',
                createTime: '2024-01-14 14:20:00',
                status: '已上架'
            },
            {
                id: '3',
                goodsName: '土豆',
                specification: '袋装/每袋5kg',
                measurementUnit: '袋',
                remark: '产地直供，品质保证',
                createTime: '2024-01-13 09:15:00',
                status: '已下架'
            },
            {
                id: '4',
                goodsName: '胡萝卜',
                specification: '散装/每斤',
                measurementUnit: '斤',
                remark: '-',
                createTime: '2024-01-12 16:45:00',
                status: '已上架'
            },
            {
                id: '5',
                goodsName: '洋葱',
                specification: '箱装/每箱10kg',
                measurementUnit: '箱',
                remark: '耐储存，适合批量采购',
                createTime: '2024-01-11 11:30:00',
                status: '已下架'
            },
            {
                id: '6',
                goodsName: '青菜',
                specification: '捆装/每捆1斤',
                measurementUnit: '捆',
                remark: '本地农场直供',
                createTime: '2024-01-10 08:20:00',
                status: '已上架'
            },
            {
                id: '7',
                goodsName: '黄瓜',
                specification: '散装/每条约200g',
                measurementUnit: '斤',
                remark: '清脆爽口，新鲜采摘',
                createTime: '2024-01-09 14:00:00',
                status: '已上架'
            },
            {
                id: '8',
                goodsName: '茄子',
                specification: '盒装/每盒3个',
                measurementUnit: '盒',
                remark: '紫皮长茄，口感细腻',
                createTime: '2024-01-08 11:15:00',
                status: '已下架'
            }
        ];

        // 生成50条模拟数据
        const generateMoreData = () => {
            const goodsNames = ['白萝卜', '芹菜', '菠菜', '韭菜', '生姜', '大蒜', '青椒', '红椒', '南瓜', '冬瓜', '丝瓜', '苦瓜', '豆角', '豆芽', '木耳', '香菇', '金针菇', '海带', '紫菜', '豆腐'];
            const specs = ['散装/每斤', '盒装/每盒500g', '袋装/每袋1kg', '箱装/每箱5kg', '捆装/每捆2斤'];
            const units = ['斤', '盒', '袋', '箱', '捆'];
            const remarks = ['新鲜蔬菜', '有机种植', '产地直供', '品质保证', '当日采摘', '-'];

            const data = [...mockData];
            for (let i = 9; i <= 50; i++) {
                const randomGoods = goodsNames[Math.floor(Math.random() * goodsNames.length)];
                const randomSpec = specs[Math.floor(Math.random() * specs.length)];
                const randomUnit = units[Math.floor(Math.random() * units.length)];
                const randomRemark = remarks[Math.floor(Math.random() * remarks.length)];
                const randomStatus = Math.random() > 0.3 ? '已上架' : '已下架';

                data.push({
                    id: i.toString(),
                    goodsName: randomGoods,
                    specification: randomSpec,
                    measurementUnit: randomUnit,
                    remark: randomRemark,
                    createTime: dayjs().subtract(i, 'day').format('YYYY-MM-DD HH:mm:ss'),
                    status: randomStatus
                });
            }
            return data;
        };

        const allData = generateMoreData();

        const App = () => {
            const [data, setData] = useState(allData.slice(0, 10));
            const [loading, setLoading] = useState(false);
            const [pagination, setPagination] = useState({
                current: 1,
                pageSize: 10,
                total: 50
            });

            // 表格列定义 - 按照用户要求调整后的字段
            const columns = [
                {
                    title: '商品名称',
                    dataIndex: 'goodsName',
                    key: 'goodsName',
                    width: 150,
                    render: (text) => <strong>{text}</strong>
                },
                {
                    title: '规格',
                    dataIndex: 'specification',
                    key: 'specification',
                    width: 180,
                    ellipsis: true,
                    render: (text) => (
                        <Tooltip title={text}>
                            <span>{text}</span>
                        </Tooltip>
                    )
                },
                {
                    title: '计量单位',
                    dataIndex: 'measurementUnit',
                    key: 'measurementUnit',
                    width: 100,
                    align: 'center'
                },
                {
                    title: '备注',
                    dataIndex: 'remark',
                    key: 'remark',
                    width: 200,
                    ellipsis: true,
                    render: (text) => text === '-' ? <span style={{color: '#999'}}>-</span> : text
                },
                {
                    title: '创建时间',
                    dataIndex: 'createTime',
                    key: 'createTime',
                    width: 170,
                    sorter: (a, b) => new Date(a.createTime) - new Date(b.createTime)
                },
                {
                    title: '操作',
                    key: 'action',
                    width: 280,
                    fixed: 'right',
                    render: (_, record) => (
                        <Space size="small">
                            <Button type="link" size="small" icon={<EditOutlined />}>编辑</Button>
                            <Button type="link" size="small" danger icon={<DeleteOutlined />}>删除</Button>
                            <Button type="link" size="small" icon={<EyeOutlined />}>查看规格</Button>
                            {record.status === '已下架' ? (
                                <Button type="link" size="small" style={{color: '#52c41a'}} icon={<ArrowUpOutlined />}>上架</Button>
                            ) : (
                                <Button type="link" size="small" style={{color: '#faad14'}} icon={<ArrowDownOutlined />}>下架</Button>
                            )}
                        </Space>
                    )
                }
            ];

            const handleTableChange = (newPagination) => {
                setLoading(true);
                setPagination(newPagination);

                // 模拟分页
                setTimeout(() => {
                    const start = (newPagination.current - 1) * newPagination.pageSize;
                    const end = start + newPagination.pageSize;
                    setData(allData.slice(start, end));
                    setLoading(false);
                }, 300);
            };

            return (
                <div className="page-container">
                    <Card>
                        {/* 页面标题 */}
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
                            <div>
                                <Typography.Title level={4} style={{ margin: 0, display: 'inline' }}>
                                    商品档案
                                </Typography.Title>
                                <span className="preview-badge">开物低代码预览</span>
                            </div>
                            <Space>
                                <Button type="primary" icon={<PlusOutlined />}>新增商品</Button>
                                <Button icon={<ImportOutlined />}>导入</Button>
                                <Button icon={<ExportOutlined />}>导出</Button>
                            </Space>
                        </div>

                        {/* 修改说明 */}
                        <div className="change-note">
                            <h4>本次字段调整说明：</h4>
                            <div style={{ lineHeight: 2 }}>
                                <div>
                                    <strong>隐藏字段：</strong>
                                    <span className="field-tag field-removed">商品图片</span>
                                    <span className="field-tag field-removed">分类</span>
                                    <span className="field-tag field-removed">单位(B端/C端)</span>
                                    <span className="field-tag field-removed">状态</span>
                                    <span className="field-tag field-removed">订单商品上浮率</span>
                                    <span className="field-tag field-removed">订单商品下浮率</span>
                                    <span className="field-tag field-removed">别名</span>
                                </div>
                                <div style={{ marginTop: 8 }}>
                                    <strong>字段改名：</strong>
                                    <span className="field-tag field-changed">商品名 → 商品名称</span>
                                </div>
                                <div style={{ marginTop: 8 }}>
                                    <strong>新增字段：</strong>
                                    <span className="field-tag field-added">规格</span>
                                    <span className="field-tag field-added">计量单位</span>
                                    <span className="field-tag field-added">备注</span>
                                </div>
                            </div>
                        </div>

                        {/* 搜索区域 */}
                        <Form layout="inline" style={{ marginBottom: 24, padding: 16, background: '#fafafa', borderRadius: 8 }}>
                            <Form.Item label="商品分类">
                                <Select placeholder="请选择" style={{ width: 120 }} allowClear>
                                    <Select.Option value="">全部</Select.Option>
                                    <Select.Option value="vegetable">蔬菜</Select.Option>
                                    <Select.Option value="fruit">水果</Select.Option>
                                    <Select.Option value="meat">肉类</Select.Option>
                                </Select>
                            </Form.Item>
                            <Form.Item label="是否上架">
                                <Select placeholder="请选择" style={{ width: 120 }} allowClear>
                                    <Select.Option value="">全部</Select.Option>
                                    <Select.Option value="on">已上架</Select.Option>
                                    <Select.Option value="off">已下架</Select.Option>
                                </Select>
                            </Form.Item>
                            <Form.Item>
                                <Space>
                                    <Button type="primary" icon={<SearchOutlined />}>查询</Button>
                                    <Button icon={<ReloadOutlined />}>重置</Button>
                                </Space>
                            </Form.Item>
                        </Form>

                        {/* 数据表格 */}
                        <Table
                            columns={columns}
                            dataSource={data}
                            rowKey="id"
                            loading={loading}
                            pagination={{
                                ...pagination,
                                showSizeChanger: true,
                                showQuickJumper: true,
                                showTotal: (total) => `共 ${total} 条`,
                                pageSizeOptions: ['10', '20', '50']
                            }}
                            onChange={handleTableChange}
                            scroll={{ x: 1200 }}
                            bordered
                            size="middle"
                        />

                        {/* 底部说明 */}
                        <Divider />
                        <div style={{ textAlign: 'center', color: '#999', fontSize: 12 }}>
                            <p>此预览基于 React + Ant Design 构建，模拟开物低代码运行效果</p>
                            <p>实际部署后将在开物低代码引擎中运行</p>
                        </div>
                    </Card>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
